      );
    }

    // Bar chart for the All Report Cards page
    function ProgressionBarChart({ data }) {
      if (!data || data.length === 0) return null;

      const width = 800;
      const height = 200;
      const padding = { top: 20, right: 20, bottom: 40, left: 40 };
      const chartW = width - padding.left - padding.right;
      const chartH = height - padding.top - padding.bottom;

      const xPos = i => padding.left + (data.length === 1 ? chartW / 2 : (i / (data.length - 1)) * chartW);
      const yPos = score => padding.top + chartH - (score / 10) * chartH;

      // Build line path
      const linePoints = data.map((d, i) => `${xPos(i)},${yPos(d.score)}`).join(" ");
      // Build subtle area fill under the line for visual weight
      const areaPath = data.length > 1
        ? `M ${xPos(0)},${yPos(0)} ${data.map((d, i) => `L ${xPos(i)},${yPos(d.score)}`).join(" ")} L ${xPos(data.length - 1)},${yPos(0)} Z`
        : "";

      return (
        <svg viewBox={`0 0 ${width} ${height}`} className="w-full" style={{ maxHeight: "240px" }}>
          {/* Gridlines + y-axis labels */}
          {[2, 4, 6, 8, 10].map(n => (
            <g key={n}>
              <line x1={padding.left} y1={yPos(n)} x2={padding.left + chartW} y2={yPos(n)} stroke="rgba(11,24,40,0.06)" strokeWidth="1" />
              <text x={padding.left - 8} y={yPos(n) + 4} fontSize="10" fill="rgba(11,24,40,0.4)" textAnchor="end">{n}</text>
            </g>
          ))}
          {/* Subtle area under line */}
          {data.length > 1 && (
            <path d={areaPath} fill="var(--gold)" opacity="0.07" />
          )}
          {/* The line itself */}
          {data.length > 1 && (
            <polyline
              points={linePoints}
              fill="none"
              stroke="var(--gold)"
              strokeWidth="2.5"
              strokeLinejoin="round"
              strokeLinecap="round"
            />
          )}
          {/* Data points */}
          {data.map((d, i) => {
            const fill = d.score >= 8 ? "var(--gold)" : d.score >= 6 ? "var(--ink)" : d.score >= 4 ? "var(--gold-soft)" : "var(--accent)";
            return (
              <g key={d.id}>
                <circle
                  cx={xPos(i)}
                  cy={yPos(d.score)}
                  r="5"
                  fill={fill}
                  stroke="white"
                  strokeWidth="2"
                />
                {data.length <= 25 && (
                  <text
                    x={xPos(i)}
                    y={yPos(d.score) - 12}
                    fontSize="10"
                    fill="rgba(11,24,40,0.6)"
                    textAnchor="middle"
                  >
                    {d.score.toFixed(1)}
                  </text>
                )}
              </g>
            );
          })}
          {/* X-axis labels (first and last) */}
          <text x={padding.left} y={height - 12} fontSize="10" fill="rgba(11,24,40,0.4)">
            {data[0].date.toLocaleDateString(undefined, { month: "short", day: "numeric" })}
          </text>
          {data.length > 1 && (
            <text x={padding.left + chartW} y={height - 12} fontSize="10" fill="rgba(11,24,40,0.4)" textAnchor="end">
              {data[data.length - 1].date.toLocaleDateString(undefined, { month: "short", day: "numeric" })}
            </text>
          )}
          {data.length > 1 && (
            <text x={padding.left + chartW / 2} y={height - 12} fontSize="9" fill="rgba(11,24,40,0.35)" textAnchor="middle">
              {data.length} sessions · oldest to newest
            </text>
          )}
        </svg>
      );
    }

    // ======================================================================
    // ROOT APP
    // ======================================================================

    // ======================================================================
    // SPIN VIEW — Objection drill. Voice-based rapid-fire responses.
    // ======================================================================

    function SpinView({ apiKey, voice, speechRate, onComplete, onCancel }) {
      const [phase, setPhase] = useState("setup"); // 'setup' | 'question' | 'grading' | 'feedback'
      const [difficulty, setDifficulty] = useState("Medium");
      const [currentQuestion, setCurrentQuestion] = useState(null);
      const [askedQuestionTexts, setAskedQuestionTexts] = useState([]);
      const [responseText, setResponseText] = useState("");
      const [interimText, setInterimText] = useState("");
      const [feedback, setFeedback] = useState(null); // { score, what_worked, what_to_improve, model_answer }
      const [drillResults, setDrillResults] = useState([]); // accumulated for the session
      const [isListening, setIsListening] = useState(false);
      const [isSpeaking, setIsSpeaking] = useState(false);
      const [isPaused, setIsPaused] = useState(false);
      const [error, setError] = useState("");

      const recRef = useRef(null);
      const finalSegmentsRef = useRef([]);
      const committingRef = useRef(false); // double-commit guard — true while a response is being graded
      const isSpeakingRef = useRef(false);
      const isListeningRef = useRef(false);
      const phaseRef = useRef(phase);
      const apiKeyRef = useRef(apiKey);
      const voiceRef = useRef(voice);
      const speechRateRef = useRef(speechRate);

      useEffect(() => { isListeningRef.current = isListening; }, [isListening]);
      useEffect(() => { phaseRef.current = phase; }, [phase]);
      useEffect(() => { apiKeyRef.current = apiKey; }, [apiKey]);
      useEffect(() => { voiceRef.current = voice; }, [voice]);
      useEffect(() => { speechRateRef.current = speechRate; }, [speechRate]);

      // Stable handler functions — kept here so we can attach/detach without rebuilding
      // the recognition object (rebuilding causes a 200-500ms cold mic-bootstrap).

      const handleResult = useCallback((event) => {
        // Defensive: ignore events that fire after we've started committing
        if (committingRef.current) return;
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const result = event.results[i];
          const txt = result[0].transcript;
          if (result.isFinal) {
            finalSegmentsRef.current.push(txt.trim());
            setResponseText(finalSegmentsRef.current.join(" "));
          } else {
            interim += txt;
          }
        }
        setInterimText(interim);
      }, []);

      const handleSttError = useCallback((e) => {
        if (e.error === "no-speech" || e.error === "aborted") return;
        if (e.error === "not-allowed") {
          setError("Microphone access denied. Allow mic permission in Chrome and reload.");
        }
      }, []);

      const handleSttEnd = useCallback(() => {
        // Auto-restart only if all conditions allow it
        if (isListeningRef.current && !isSpeakingRef.current && !committingRef.current && phaseRef.current === "question" && recRef.current) {
          try { recRef.current.start(); } catch {}
        }
      }, []);

      const attachRecognitionHandlers = useCallback(() => {
        const rec = recRef.current;
        if (!rec) return;
        rec.onresult = handleResult;
        rec.onerror = handleSttError;
        rec.onend = handleSttEnd;
      }, [handleResult, handleSttError, handleSttEnd]);

      const detachRecognitionHandlers = useCallback(() => {
        const rec = recRef.current;
        if (!rec) return;
        try { rec.onresult = null; } catch {}
        try { rec.onerror = null; } catch {}
        try { rec.onend = null; } catch {}
      }, []);

      // Abort recognition for commit — detaches handlers + abort() discards pending results.
      // The recognition object itself stays alive so we don't pay a cold mic-bootstrap cost.
      const abortRecognitionForCommit = useCallback(() => {
        const rec = recRef.current;
        if (!rec) return;
        detachRecognitionHandlers();
        try { rec.abort(); } catch {}
      }, [detachRecognitionHandlers]);

      // ---------------- Set up speech recognition ----------------
      useEffect(() => {
        const rec = getSpeechRecognition();
        if (!rec) {
          setError("Your browser doesn't support speech recognition. Please use Chrome.");
          return;
        }
        recRef.current = rec;
        attachRecognitionHandlers();

        return () => {
          // On unmount only: detach + abort + null out
          detachRecognitionHandlers();
          try { rec.abort(); } catch {}
          recRef.current = null;
        };
      }, [attachRecognitionHandlers, detachRecognitionHandlers]);

      useEffect(() => {
        if (!recRef.current) return;
        if (isListening) {
          // Make sure handlers are attached (they may have been detached during commit)
          attachRecognitionHandlers();
          try { recRef.current.start(); } catch {}
        } else {
          try { recRef.current.stop(); } catch {}
        }
      }, [isListening, attachRecognitionHandlers]);

      // ---------------- Flow ----------------

      const startDrill = () => {
        const q = pickSpinQuestion(difficulty, askedQuestionTexts);
        setCurrentQuestion(q);
        setAskedQuestionTexts(prev => [...prev, q.text]);
        setResponseText("");
        setInterimText("");
        setFeedback(null);
        setPhase("question");
        // Speak the question to the advisor
        speakQuestion(q.text);
      };

      const speakQuestion = async (text) => {
        isSpeakingRef.current = true;
        setIsSpeaking(true);
        // DEFENSIVE: clear any leftover advisor buffers from the previous question
        finalSegmentsRef.current = [];
        setInterimText("");
        setResponseText("");
        // Abort the current recognition cleanly — a fresh one will be built when mic re-arms
        abortRecognitionForCommit();
        await speak({
          text,
          voice: getBestVoice(voiceRef.current),
          rate: speechRateRef.current,
          onEnd: () => {
            isSpeakingRef.current = false;
            setIsSpeaking(false);
            setIsPaused(false); // Reset pause state — fresh start for next question
            // Belt-and-suspenders: clear once more right before mic auto-restarts
            finalSegmentsRef.current = [];
            setInterimText("");
            setResponseText("");
            // Auto-start listening after the question is spoken
            setIsListening(true);
          },
        });
      };

      // Pause / resume the question's currently-playing audio.
      const togglePauseAudio = () => {
        if (!isSpeaking) return;
        if (isPaused) {
          resumeSpeaking();
          setIsPaused(false);
        } else {
          pauseSpeaking();
          setIsPaused(true);
        }
      };

      const handleSubmit = useCallback(async () => {
        // GUARD: ignore if a commit is already in flight
        if (committingRef.current) return;

        // Combine final segments + any pending interim text the user has spoken but not yet finalized
        const accumulatedFinal = finalSegmentsRef.current.join(" ").trim();
        const interimToInclude = (interimText || "").trim();
        const fullText = (accumulatedFinal + (interimToInclude ? " " + interimToInclude : "")).trim() || responseText.trim();
        if (!fullText) return;

        // Set the guard FIRST so any late onresult events from the recognizer get ignored
        committingRef.current = true;

        // INSTANT FEEDBACK: show "Grading…" immediately, before any other work
        setPhase("grading");

        // Clear all buffers immediately
        finalSegmentsRef.current = [];
        setInterimText("");

        // Abort recognition cleanly — handlers detached, abort() discards pending results,
        // but the recognition object stays alive for fast re-arm next question.
        setIsListening(false);
        abortRecognitionForCommit();

        try {
          await gradeResponse(fullText);
        } finally {
          committingRef.current = false;
        }
      }, [responseText, interimText, abortRecognitionForCommit]);

      const gradeResponse = async (advisorText) => {
        if (!currentQuestion) return;
        setPhase("grading");
        try {
          const reply = await callGroq({
            apiKey: apiKeyRef.current,
            model: MODEL_GRADER,
            messages: [
              { role: "system", content: "You are a meticulous sales coach evaluating a single objection-handling drill response. Always return valid JSON." },
              { role: "user", content: buildSpinGraderPrompt(currentQuestion, advisorText, difficulty) },
            ],
            temperature: 0.3,
            jsonMode: true,
          });
          const parsed = JSON.parse(reply);
          setFeedback(parsed);
          setResponseText(advisorText);
          setDrillResults(prev => [...prev, {
            question: currentQuestion,
            response: advisorText,
            score: parsed.score,
            what_worked: parsed.what_worked,
            what_to_improve: parsed.what_to_improve,
            model_answer: parsed.model_answer,
            difficulty,
          }]);
          setPhase("feedback");
        } catch (e) {
          setError("Couldn't grade response: " + e.message);
          setPhase("question");
        }
      };

      const tryAgain = () => {
        // Same question, fresh response
        setResponseText("");
        setInterimText("");
        setFeedback(null);
        finalSegmentsRef.current = [];
        setPhase("question");
        speakQuestion(currentQuestion.text);
      };

      const nextQuestion = () => {
        startDrill();
      };

      const replayQuestion = () => {
        if (!currentQuestion) return;
        speakQuestion(currentQuestion.text);
      };

      const finishSession = () => {
        if (drillResults.length === 0) {
          onCancel();
          return;
        }
        // Save the drill session as a special kind of "report"
        onComplete(drillResults, difficulty);
      };

      // Average score so far
      const avgScore = drillResults.length > 0
        ? drillResults.reduce((sum, r) => sum + r.score, 0) / drillResults.length
        : null;

      // ---------------- UI ----------------

      // Setup phase: pick difficulty
      if (phase === "setup") {
        return (
          <div className="min-h-screen flex flex-col">
            <div className="border-b ink-bg px-8 py-4 flex items-center justify-between">
              <div className="flex items-center gap-6">
                <Logo />
                <div className="h-8 w-px bg-white/20"></div>
                <div>
                  <div className="text-[10px] uppercase tracking-[0.25em] text-white/70">Objections Drill</div>
                  <div className="text-sm text-white">Objection-handling practice</div>
                </div>
              </div>
              <button onClick={onCancel} className="text-xs uppercase tracking-[0.18em] text-white/60 hover:text-white">Exit</button>
            </div>

            <div className="flex-1 max-w-3xl w-full mx-auto px-8 py-12 fade-up">
              <div className="text-xs uppercase tracking-[0.25em] text-[var(--gold)] mb-2">Objections mode</div>
              <h1 className="font-display text-4xl mb-3 leading-tight">Drill the hard stuff.</h1>
              <p className="text-sm text-[var(--ink)]/70 mb-8 max-w-xl leading-relaxed">
                You'll hear a tough question or objection — the kind that comes up in real client meetings. Respond out loud, like you would in the room. The coach grades your response and shows you a model answer. Hit Try Again to redo the same question, or Next to move on.
              </p>

              <div className="card p-6 mb-8">
                <div className="text-[11px] uppercase tracking-[0.18em] text-[var(--ink)]/60 mb-3">Difficulty</div>
                <div className="grid grid-cols-3 gap-3">
                  {[
                    { value: "Easy", label: "Easy", desc: "Common, predictable objections most advisors have heard before" },
                    { value: "Medium", label: "Medium", desc: "Pointed questions that demand specific knowledge to answer well" },
                    { value: "Hard", label: "Hard", desc: "Aggressive, multi-part questions that fluster experienced advisors" },
                  ].map(opt => (
                    <button
                      key={opt.value}
                      onClick={() => setDifficulty(opt.value)}
                      className={`p-4 rounded text-left transition-all ${
                        difficulty === opt.value ? "ink-bg" : "border border-[var(--rule)] hover:border-[var(--ink)]"
                      }`}
                    >
                      <div className={`font-display text-base mb-1 ${difficulty === opt.value ? "text-[var(--parchment)]" : "text-[var(--ink)]"}`}>
                        {opt.label}
                      </div>
                      <div className={`text-[11px] leading-relaxed ${difficulty === opt.value ? "text-[var(--parchment)]/70" : "text-[var(--ink)]/60"}`}>
                        {opt.desc}
                      </div>
                    </button>
                  ))}
                </div>
              </div>

              <div className="card-warm p-5 mb-8">
                <div className="text-[10px] uppercase tracking-[0.25em] text-[var(--gold)] mb-2">How it works</div>
                <ul className="text-sm text-[var(--ink)]/80 space-y-1.5 leading-relaxed">
                  <li>• You'll hear a question. Respond out loud naturally.</li>
                  <li>• Pause briefly when you're done — the system will know you've finished.</li>
                  <li>• You'll get a 1-10 score with feedback and a model answer.</li>
                  <li>• Try Again repeats the same question. Next gives you a new one.</li>
                  <li>• When you're done, exit to save your drill session.</li>
                </ul>
              </div>

              <button onClick={startDrill} className="btn-gold px-8 py-3 rounded text-xs uppercase tracking-[0.2em]">
                Start Drilling →
              </button>
            </div>
          </div>
        );
      }

      // Question / response / feedback phases
      const totalSoFar = drillResults.length;
      return (
        <div className="min-h-screen flex flex-col">
          {/* Top bar */}
          <div className="border-b ink-bg px-8 py-4 flex items-center justify-between">
            <div className="flex items-center gap-6">
              <Logo />
              <div className="h-8 w-px bg-white/20"></div>
              <div>
                <div className="text-[10px] uppercase tracking-[0.25em] text-white/70">Objections · {difficulty}</div>
                <div className="text-sm text-white">
                  Question {totalSoFar + (phase === "feedback" ? 0 : 1)}{avgScore !== null && ` · Avg ${avgScore.toFixed(1)}`}
                </div>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <button onClick={onCancel} className="text-xs uppercase tracking-[0.18em] text-white/60 hover:text-white">Discard</button>
              <button onClick={finishSession} className="px-5 py-2.5 rounded text-xs uppercase tracking-[0.18em] bg-white text-[var(--teal)] hover:bg-white/90 transition-all font-medium">
                End Drill
              </button>
            </div>
          </div>

          {error && <div className="bg-[var(--accent)] text-white px-8 py-3 text-sm">{error}</div>}

          <div className="flex-1 max-w-3xl w-full mx-auto px-8 py-10">
            {/* Question card */}
            {currentQuestion && (
              <div className="card-warm p-8 mb-8 fade-up">
                <div className="flex items-center justify-between mb-3">
                  <div className="text-[10px] uppercase tracking-[0.25em] text-[var(--gold)]">{currentQuestion.category} · {difficulty}</div>
                  {phase === "question" && !isSpeaking && (
                    <button onClick={replayQuestion} className="text-[10px] uppercase tracking-[0.18em] text-[var(--ink)]/50 hover:text-[var(--ink)]">
                      ↻ Replay question
                    </button>
                  )}
                </div>
                <div className="font-display text-2xl leading-snug text-[var(--ink)]">
                  "{currentQuestion.text}"
                </div>
                {isSpeaking && (
                  <div className="mt-4 flex items-center gap-2 text-xs text-[var(--gold)] uppercase tracking-[0.18em]">
                    <div className="flex items-end gap-0.5 h-3">
                      {[0,1,2,3].map(i => (
                        <div key={i} className="wave-bar w-0.5 h-full bg-current rounded-full"></div>
                      ))}
                    </div>
                    Listen to the question
                  </div>
                )}
              </div>
            )}

            {/* Phase: question (waiting for response) */}
            {phase === "question" && (
              <>
                {/* Live transcript building as the advisor speaks */}
                {(responseText || interimText) && (
                  <div className="card p-6 mb-6">
                    <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--ink)]/60 mb-2">Your response</div>
                    <div className="text-sm text-[var(--ink)] leading-relaxed">
                      {responseText}
                      {interimText && (
                        <span className="text-[var(--ink)]/40 italic">{responseText ? " " : ""}{interimText}</span>
                      )}
                    </div>
                  </div>
                )}
                {!responseText && !interimText && !isSpeaking && (
                  <div className="card p-6 mb-6 border-dashed text-center">
                    <div className="text-sm text-[var(--ink)]/50 italic">
                      {isListening
                        ? "Listening — start speaking, take your time."
                        : "Click the mic below when you're ready to respond."}
                    </div>
                  </div>
                )}

                <div className="flex flex-col items-center mt-8">
                  <div className="text-xs uppercase tracking-[0.2em] mb-4" style={{ color: isListening ? "var(--accent)" : "var(--ink)" }}>
                    {isPaused ? "Audio paused" : isSpeaking ? "Question playing…" : isListening ? "Mic on — recording" : "Mic off"}
                  </div>
                  <div className="flex items-center gap-4">
                    <button
                      onClick={() => setIsListening(l => !l)}
                      disabled={isSpeaking}
                      className={`w-20 h-20 rounded-full flex items-center justify-center relative transition-all ${
                        isListening ? "bg-[var(--accent)] text-white pulse-ring" : "btn-primary"
                      }`}
                      style={{ opacity: isSpeaking ? 0.5 : 1 }}
                      title={isListening ? "Pause mic" : "Start mic"}
                    >
                      <svg viewBox="0 0 24 24" fill="currentColor" className="w-8 h-8">
                        <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3z"/>
                        <path d="M19 11a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.93V21h-2a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-3.07A7 7 0 0 0 19 11z"/>
                      </svg>
                    </button>
                  </div>

                  {/* Pause/Resume audio button — only visible while a question is playing */}
                  {isSpeaking && (
                    <button
                      onClick={togglePauseAudio}
                      className="mt-4 px-5 py-2 rounded-full text-xs uppercase tracking-[0.18em] border transition-colors"
                      style={{
                        borderColor: "var(--rule)",
                        background: isPaused ? "var(--gold)" : "transparent",
                        color: isPaused ? "white" : "var(--ink)",
                      }}
                      aria-label={isPaused ? "Resume audio" : "Pause audio"}
                    >
                      {isPaused ? (
                        <span className="flex items-center gap-2">
                          <svg viewBox="0 0 24 24" fill="currentColor" className="w-3 h-3"><path d="M8 5v14l11-7z"/></svg>
                          Resume
                        </span>
                      ) : (
                        <span className="flex items-center gap-2">
                          <svg viewBox="0 0 24 24" fill="currentColor" className="w-3 h-3"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
                          Pause Audio
                        </span>
                      )}
                    </button>
                  )}

                  <div className="text-[11px] text-[var(--ink)]/50 mt-3 text-center max-w-sm">
                    Take your time. The mic will keep recording until you hit Submit.
                  </div>
                </div>

                {/* Submit button — appears once there's something to submit */}
                {(responseText || interimText) && (
                  <div className="mt-8 flex justify-center fade-up">
                    <button
                      onClick={handleSubmit}
                      disabled={isSpeaking || (!responseText && !interimText)}
                      className="btn-gold px-10 py-4 rounded text-xs uppercase tracking-[0.2em]"
                    >
                      Submit Response →
                    </button>
                  </div>
                )}

                {/* Clear & restart option for if they fumble */}
                {responseText && (
                  <div className="mt-3 flex justify-center">
                    <button
                      onClick={() => {
                        setResponseText("");
                        setInterimText("");
                        finalSegmentsRef.current = [];
                      }}
                      className="text-[10px] uppercase tracking-[0.18em] text-[var(--ink)]/40 hover:text-[var(--accent)]"
                    >
                      ↻ Clear & restart this answer
                    </button>
                  </div>
                )}
              </>
            )}

            {/* Phase: grading */}
            {phase === "grading" && (
              <div className="text-center py-16 fade-up">
                <div className="font-display text-2xl mb-3 italic">Grading your response…</div>
                <div className="flex items-center justify-center gap-2">
                  {[0,1,2].map(i => (
                    <div key={i} className="w-2 h-2 rounded-full" style={{ background: "var(--gold)", animation: `pulse 1.4s ease-in-out ${i * 0.2}s infinite` }}></div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Feedback modal — overlays everything, advisor must choose Try Again / Next / End Drill from here */}
          {phase === "feedback" && feedback && currentQuestion && (
            <ObjectionsFeedbackModal
              question={currentQuestion}
              difficulty={difficulty}
              responseText={responseText}
              feedback={feedback}
              onTryAgain={tryAgain}
              onNext={nextQuestion}
              onEndDrill={finishSession}
            />
          )}
        </div>
      );
    }

    // ======================================================================
    // OBJECTIONS FEEDBACK MODAL — score popup after submit
    // ======================================================================

    function ObjectionsFeedbackModal({ question, difficulty, responseText, feedback, onTryAgain, onNext, onEndDrill }) {
      const scoreColor = feedback.score >= 8 ? "var(--gold)" : feedback.score >= 6 ? "var(--ink)" : feedback.score >= 4 ? "var(--gold-soft)" : "var(--accent)";

      return (
        <div className="fixed inset-0 z-50 flex items-stretch md:items-center justify-center md:p-6" style={{ background: "rgba(33, 101, 97, 0.4)", backdropFilter: "blur(4px)" }}>
          <div className="card w-full max-w-2xl flex flex-col fade-up overflow-hidden" style={{ maxHeight: "92vh" }}>
            {/* Header */}
            <div className="ink-bg p-6 flex items-center justify-between">
              <div>
                <div className="text-[10px] uppercase tracking-[0.25em] text-white/70 mb-1">Objection · {question.category} · {difficulty}</div>
                <div className="font-display text-lg text-white leading-snug">"{question.text}"</div>
              </div>
            </div>

            {/* Body — scrollable */}
            <div className="flex-1 overflow-y-auto p-6 space-y-4">
              {/* Score */}
              <div className="flex items-end gap-6 pb-4 border-b" style={{ borderColor: "var(--rule)" }}>
                <div className="font-display text-7xl leading-none tabular-nums" style={{ color: scoreColor }}>
                  {feedback.score}
                </div>
                <div className="text-xs uppercase tracking-[0.18em] text-[var(--ink)]/50 pb-2">
                  Score<br/>out of 10
                </div>
              </div>

              {/* Your response */}
              <div>
                <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--ink)]/60 mb-2">Your response</div>
                <div className="text-sm text-[var(--ink)] leading-relaxed italic">"{responseText}"</div>
              </div>

              {/* What worked */}
              {feedback.what_worked && (
                <div className="card p-4">
                  <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--gold)] mb-1.5">What worked</div>
                  <div className="text-sm text-[var(--ink)]/80 leading-relaxed">{feedback.what_worked}</div>
                </div>
              )}

              {/* What to improve */}
              {feedback.what_to_improve && (
                <div className="card p-4">
                  <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--accent)] mb-1.5">What to improve</div>
                  <div className="text-sm text-[var(--ink)]/80 leading-relaxed">{feedback.what_to_improve}</div>
                </div>
              )}

              {/* Model answer */}
              {feedback.model_answer && (
                <div className="card-warm p-4">
                  <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--gold)] mb-1.5">Model answer</div>
                  <div className="text-sm text-[var(--ink)]/80 leading-relaxed italic">"{feedback.model_answer}"</div>
                </div>
              )}
            </div>

            {/* Footer actions */}
            <div className="border-t p-4 flex justify-between gap-3 flex-wrap" style={{ borderColor: "var(--rule)" }}>
              <button onClick={onEndDrill} className="px-5 py-3 rounded text-xs uppercase tracking-[0.18em] text-[var(--ink)]/60 hover:text-[var(--ink)]">
                End Drill
              </button>
              <div className="flex gap-3 flex-wrap">
                <button onClick={onTryAgain} className="btn-ghost px-6 py-3 rounded text-xs uppercase tracking-[0.18em]">
                  ↻ Try Again
                </button>
                <button onClick={onNext} className="btn-primary px-6 py-3 rounded text-xs uppercase tracking-[0.18em]">
                  Next Question →
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ======================================================================
    // MY TEAM VIEW — Cross-team leaderboard, strengths/weaknesses, pairing
    // ======================================================================

    const RUBRIC_KEYS = [
      "meeting_introduction",
      "profiling",
      "uncovering_problems",
      "reviewing_implications",
      "providing_solutions",
      "call_to_action",
      "wrap_up",
    ];

    // True if this is a real Pitch session (mode === "pitch").
    // Used by Team views (leaderboard, team breakdown, per-advisor stats) — these ALWAYS exclude
    // practice, curriculum, and Objections drills regardless of any toggle.
    function isPitchReport(report) {
      if (!report || !report.card) return false;
      if (report.mode !== "pitch") return false;
      if (report.card.isObjectionsDrill) return false;
      return true;
    }

    // ====================================================================
    // DIFFICULTY MULTIPLIER SYSTEM
    // ====================================================================
    // Easy pitches are easier to score well on (cooperative prospect), so they're
    // worth less on the leaderboard. Hard pitches are tougher (skeptical, demanding
    // prospect), so they're worth more. Medium is the baseline.
    //
    // The multiplier applies only to the OVERALL pitch score used for stats and
    // leaderboard. Individual rubric category scores stay raw — they're diagnostic.
    const DIFFICULTY_MULTIPLIERS = {
      Easy: 0.8,
      Medium: 1.0,
      Hard: 1.2,
    };

    // Returns the multiplier for a report's difficulty (defaults to Medium = 1.0).
    function getDifficultyMultiplier(report) {
      const diff = report?.persona?.difficulty;
      return DIFFICULTY_MULTIPLIERS[diff] ?? 1.0;
    }

    // Compute the RAW overall score for a report — average of all rubric category scores.
    // Returns null if there are no scored categories (e.g. Objections drill with empty scores).
    function getRawScore(report) {
      const scoresObj = report?.card?.scores;
      if (!scoresObj) return null;
      const scores = Object.values(scoresObj)
        .map(s => s?.score)
        .filter(s => typeof s === "number" && s > 0);
      if (scores.length === 0) return null;
      return scores.reduce((a, b) => a + b, 0) / scores.length;
    }

    // Compute the difficulty-ADJUSTED overall score for a report.
    // Returns null if raw score is null.
    function getAdjustedScore(report) {
      const raw = getRawScore(report);
      if (raw === null) return null;
      return raw * getDifficultyMultiplier(report);
    }

    // True if this report should count toward the *personal* Report Cards stats given the user's toggle.
    // Pitches always count. Practice + Curriculum count only if includePracticeAndCurriculum is true.
    // Objections drills NEVER count (no toggle for them).
    function shouldCountForPersonalStats(report, includePracticeAndCurriculum) {
      if (!report || !report.card) return false;
      if (report.mode === "spin" || report.card.isObjectionsDrill) return false;
      if (report.mode === "pitch") return true;
      if (includePracticeAndCurriculum && (report.mode === "practice" || report.mode === "curriculum")) return true;
      return false;
    }

    // Compute per-category averages from a list of report cards
    function computeCategoryAverages(reports) {
      const sums = {}; const counts = {};
      RUBRIC_KEYS.forEach(k => { sums[k] = 0; counts[k] = 0; });
      for (const r of reports) {
        const scores = r.card?.scores;
        if (!scores) continue;
        for (const k of RUBRIC_KEYS) {
          const s = scores[k]?.score;
          if (typeof s === "number" && s > 0) {
            sums[k] += s;
            counts[k] += 1;
          }
        }
      }
      const averages = {};
      for (const k of RUBRIC_KEYS) {
        averages[k] = counts[k] > 0 ? sums[k] / counts[k] : null;
      }
      return averages;
    }

    // For each rubric category: all-time avg, 90-day avg, and trend (delta)
    function computeCategoryBreakdown(reports) {
      const cutoff = Date.now() - 90 * 24 * 60 * 60 * 1000;
      const recent = reports.filter(r => r.createdAt >= cutoff);

      const allTime = computeCategoryAverages(reports);
      const last30 = computeCategoryAverages(recent);

      return RUBRIC_KEYS.map(k => {
        const allAvg = allTime[k];
        const recentAvg = last30[k];
        const delta = (allAvg !== null && recentAvg !== null) ? (recentAvg - allAvg) : null;
        return {
          key: k,
          label: RUBRIC_LABELS[k] || k,
          allTime: allAvg,
          last30: recentAvg,
          delta,
        };
      });
    }

    // Reusable category breakdown grid (used in Report Cards and My Team)
    function CategoryBreakdownGrid({ breakdown, recentLabel = "Last 90 days" }) {
      const colorForScore = (s) => {
        if (s === null) return "var(--ink)";
        if (s >= 8) return "var(--gold)";
        if (s >= 6) return "var(--ink)";
        if (s >= 4) return "var(--gold-soft)";
        return "var(--accent)";
      };
      const colorForDelta = (d) => {
        if (d === null) return "var(--ink)";
        if (d > 0.3) return "var(--gold)";
        if (d < -0.3) return "var(--accent)";
        return "var(--ink)";
      };
      const arrowFor = (d) => {
        if (d === null) return "—";
        if (d > 0.3) return "↗";
        if (d < -0.3) return "↘";
        return "→";
      };

      return (
        <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-3">
          {breakdown.map((b, idx) => (
            <div key={b.key} className="card p-4">
              <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--ink)]/50 mb-3 leading-tight" style={{ minHeight: "28px" }}>
                <span className="opacity-50 mr-1">{idx + 1}.</span>{b.label}
              </div>
              <div className="flex items-end justify-between gap-2 mb-3">
                <div>
                  <div className="text-[9px] uppercase tracking-[0.18em] text-[var(--ink)]/40 mb-0.5">All-time</div>
                  <div className="font-display text-2xl leading-none tabular-nums" style={{ color: colorForScore(b.allTime) }}>
                    {b.allTime !== null ? b.allTime.toFixed(1) : "—"}
                  </div>
                </div>
                <div className="text-right">
                  <div className="text-[9px] uppercase tracking-[0.18em] text-[var(--ink)]/40 mb-0.5">{recentLabel}</div>
                  <div className="font-display text-2xl leading-none tabular-nums" style={{ color: colorForScore(b.last30) }}>
                    {b.last30 !== null ? b.last30.toFixed(1) : "—"}
                  </div>
                </div>
              </div>
              <div className="pt-2 border-t" style={{ borderColor: "var(--rule)" }}>
                <div className="flex items-center justify-between text-[11px]">
                  <span className="uppercase tracking-[0.15em] text-[var(--ink)]/50">Trend</span>
                  <span className="font-display tabular-nums" style={{ color: colorForDelta(b.delta) }}>
                    {arrowFor(b.delta)}
                    {b.delta !== null && (
                      <span className="ml-1 text-xs">
                        {b.delta >= 0 ? "+" : ""}{b.delta.toFixed(1)}
                      </span>
                    )}
                  </span>
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // Identify strengths (top 3) and growth areas (bottom 3) from averages
    function getStrengthsAndGrowth(averages) {
      const entries = Object.entries(averages).filter(([_, v]) => v !== null);
      if (entries.length === 0) return { strengths: [], growth: [] };
      const sorted = [...entries].sort((a, b) => b[1] - a[1]);
      return {
        strengths: sorted.slice(0, 3).map(([k, v]) => ({ key: k, score: v })),
        growth: sorted.slice(-3).reverse().map(([k, v]) => ({ key: k, score: v })),
      };
    }

    // Pairing algorithm — find the advisor whose strengths best complement my growth areas
    function findBestPairing(myProfile, allTeamData) {
      const candidates = allTeamData.filter(t => t.userId !== myProfile.userId && t.reportCount > 0);
      if (candidates.length === 0) return null;

      let best = null;
      let bestScore = -Infinity;

      for (const candidate of candidates) {
        // Score: how well does candidate's strengths cover my growth areas + vice versa?
        let pairScore = 0;
        for (const myWeakness of myProfile.growth) {
          const theirScore = candidate.averages[myWeakness.key];
          if (theirScore !== null) {
            // The bigger the gap (their score - my score), the better the help
            pairScore += Math.max(0, theirScore - myWeakness.score) * 1.5;
          }
        }
        for (const theirWeakness of candidate.growth) {
          const myScore = myProfile.averages[theirWeakness.key];
          if (myScore !== null) {
            pairScore += Math.max(0, myScore - theirWeakness.score) * 1.5;
          }
        }
        if (pairScore > bestScore) {
          bestScore = pairScore;
          best = candidate;
        }
      }

      return best && bestScore > 0 ? best : (candidates[0] || null);
    }

    // ======================================================================
    // TEAM-LEVEL PAIRING LOGIC
    // ======================================================================

    // Score how good a pairing of two advisors is (higher = more complementary).
    // Always uses Pitches-Only data — Practice/Curriculum scores are softer
    // and would muddy the strength/weakness signal.
    function scorePair(a, b) {
      let score = 0;
      const details = []; // category-level breakdown for the explanation
      // For each rubric category, compute reciprocal benefit
      for (const key of Object.keys(RUBRIC_LABELS)) {
        const aScore = a.averages[key];
        const bScore = b.averages[key];
        if (aScore === null || bScore === null) continue;
        const gap = Math.abs(aScore - bScore);
        if (gap >= 1.0) {
          // Real complementary gap — credit the stronger one for helping the weaker
          score += gap * 1.5;
          details.push({ key, aScore, bScore, gap, helper: aScore > bScore ? a.userId : b.userId });
        }
      }
      return { score, details };
    }

    // Generate every possible way to pair up an even number of items (exhaustive).
    // For N=2: 1 pairing. N=4: 3. N=6: 15. N=8: 105. N=10: 945. N=12: 10,395.
    // Caps out around 12 — beyond that we use greedy fallback.
    function allPairings(items) {
      if (items.length === 0) return [[]];
      if (items.length === 2) return [[[items[0], items[1]]]];
      const first = items[0];
      const rest = items.slice(1);
      const result = [];
      for (let i = 0; i < rest.length; i++) {
        const partner = rest[i];
        const remaining = rest.filter((_, idx) => idx !== i);
        const subPairings = allPairings(remaining);
        for (const sub of subPairings) {
          result.push([[first, partner], ...sub]);
        }
      }
      return result;
    }

    // Pair an even-sized group of advisor profiles using either exhaustive
    // (if small enough) or greedy nearest-complement (if too many).
    // Returns: { pairs: [[a, b], ...], totalScore, method, allDetails: [{pair, scoring}, ...] }
    function pairUpAdvisors(advisorProfiles) {
      if (advisorProfiles.length < 2) return { pairs: [], totalScore: 0, method: "none", allDetails: [] };
      if (advisorProfiles.length % 2 !== 0) {
        throw new Error("pairUpAdvisors expects an even-sized array");
      }

      const N = advisorProfiles.length;
      const useExhaustive = N <= 12;

      if (useExhaustive) {
        // Try every possible pairing combination
        const allCombos = allPairings(advisorProfiles);
        let best = null;
        let bestScore = -Infinity;
        let bestDetails = null;
        for (const combo of allCombos) {
          let total = 0;
          const details = [];
          for (const [a, b] of combo) {
            const { score, details: d } = scorePair(a, b);
            total += score;
            details.push({ pair: [a, b], scoring: { score, details: d } });
          }
          if (total > bestScore) {
            bestScore = total;
            best = combo;
            bestDetails = details;
          }
        }
        return { pairs: best, totalScore: bestScore, method: "exhaustive", allDetails: bestDetails };
      } else {
        // Greedy: pair each unpaired person with their best remaining complement
        const remaining = [...advisorProfiles];
        const pairs = [];
        const allDetails = [];
        let totalScore = 0;
        while (remaining.length >= 2) {
          const a = remaining.shift();
          let bestIdx = 0;
          let bestPairScore = -Infinity;
          let bestScoring = null;
          for (let i = 0; i < remaining.length; i++) {
            const scoring = scorePair(a, remaining[i]);
            if (scoring.score > bestPairScore) {
              bestPairScore = scoring.score;
              bestIdx = i;
              bestScoring = scoring;
            }
          }
          const b = remaining.splice(bestIdx, 1)[0];
          pairs.push([a, b]);
          totalScore += bestPairScore;
          allDetails.push({ pair: [a, b], scoring: bestScoring });
        }
        return { pairs, totalScore, method: "greedy", allDetails };
      }
    }

    // Choose the listener for an odd-sized selection: lowest scorer with 3+ pitches,
    // or just the lowest scorer if no one has 3+.
    function chooseListener(advisorProfiles) {
      const eligible = advisorProfiles.filter(p => p.reportCount >= 3);
      const pool = eligible.length > 0 ? eligible : advisorProfiles;
      // Sort ascending by overall — lowest scorer becomes listener
      const sorted = [...pool].sort((a, b) => (a.overall ?? 0) - (b.overall ?? 0));
      return sorted[0];
    }

    // Build the human-readable pair description: section comparison + explanation + action sentences.
    function buildPairExplanation(a, b, scoring) {
      // What does each person help the other with?
      // For each significant gap, the higher-scorer helps the lower-scorer in that category.
      const aHelpsB = []; // categories where a is stronger than b
      const bHelpsA = []; // categories where b is stronger than a

      for (const detail of scoring.details) {
        if (detail.helper === a.userId) {
          aHelpsB.push({ key: detail.key, label: RUBRIC_LABELS[detail.key] || detail.key, aScore: detail.aScore, bScore: detail.bScore });
        } else {
          bHelpsA.push({ key: detail.key, label: RUBRIC_LABELS[detail.key] || detail.key, aScore: detail.aScore, bScore: detail.bScore });
        }
      }

      // Sort by gap size (most useful coaching first)
      aHelpsB.sort((x, y) => (y.aScore - y.bScore) - (x.aScore - x.bScore));
      bHelpsA.sort((x, y) => (y.bScore - y.aScore) - (x.bScore - x.aScore));

      const top_a_help = aHelpsB[0];
      const top_b_help = bHelpsA[0];

      // Build sentences
      let explanation = "";
      let action = "";

      if (top_a_help && top_b_help) {
        explanation = `${a.name}'s strength is ${top_a_help.label} (${top_a_help.aScore.toFixed(1)}) — exactly where ${b.name} is weakest (${top_a_help.bScore.toFixed(1)}). In return, ${b.name}'s strength is ${top_b_help.label} (${top_b_help.bScore.toFixed(1)}) which addresses ${a.name}'s weaker area (${top_b_help.aScore.toFixed(1)}). They're well matched to coach each other.`;
        action = `${a.name} will help ${b.name} with ${top_a_help.label}. ${b.name} will help ${a.name} with ${top_b_help.label}.`;
      } else if (top_a_help) {
        explanation = `${a.name}'s strength in ${top_a_help.label} (${top_a_help.aScore.toFixed(1)}) addresses ${b.name}'s weaker area in that category (${top_a_help.bScore.toFixed(1)}). ${b.name} doesn't yet have a clearly complementary strength to offer back, but the practice partnership is still valuable.`;
        action = `${a.name} will help ${b.name} with ${top_a_help.label}.`;
      } else if (top_b_help) {
        explanation = `${b.name}'s strength in ${top_b_help.label} (${top_b_help.bScore.toFixed(1)}) addresses ${a.name}'s weaker area in that category (${top_b_help.aScore.toFixed(1)}). ${a.name} doesn't yet have a clearly complementary strength to offer back, but the practice partnership is still valuable.`;
        action = `${b.name} will help ${a.name} with ${top_b_help.label}.`;
      } else {
        explanation = `${a.name} and ${b.name} have similar performance profiles. They can practice together as peers — neither has clear complementary strengths to coach the other right now.`;
        action = `Pair as practice partners.`;
      }

      return { explanation, action, aHelpsB, bHelpsA };
    }

    // Generate pairings + listener for a selection of advisor profiles.
    // Returns: { pairs: [{a, b, scoring, explanation, action}, ...], listener: profile|null, attachedToPairIdx, method, warnings }
    function generateTeamPairings(advisorProfiles) {
      const warnings = [];
      if (advisorProfiles.length === 0) {
        return { pairs: [], listener: null, method: "none", warnings: ["No advisors selected."] };
      }
      if (advisorProfiles.length === 1) {
        return { pairs: [], listener: advisorProfiles[0], attachedToPairIdx: null, method: "none", warnings: ["Only one advisor selected — they'd need a partner to practice with."] };
      }

      const advisorsWithLowData = advisorProfiles.filter(p => p.reportCount < 3);
      if (advisorsWithLowData.length > 0) {
        warnings.push(`${advisorsWithLowData.length} advisor${advisorsWithLowData.length === 1 ? " has" : "s have"} fewer than 3 scored Pitch sessions — pairing recommendations for ${advisorsWithLowData.length === 1 ? "them" : "them"} are based on limited data.`);
      }

      let listener = null;
      let toPair = [...advisorProfiles];

      if (toPair.length % 2 === 1) {
        listener = chooseListener(toPair);
        toPair = toPair.filter(p => p.userId !== listener.userId);
      }

      const { pairs, totalScore, method, allDetails } = pairUpAdvisors(toPair);

      // Build explanations for each pair
      const detailedPairs = allDetails.map(({ pair: [a, b], scoring }) => {
        const explanation = buildPairExplanation(a, b, scoring);
        return { a, b, scoring, ...explanation };
      });

      // If listener exists, attach them to the highest-scoring pair
      let attachedToPairIdx = null;
      if (listener && detailedPairs.length > 0) {
        // Find the pair with the highest combined overall score
        let bestPairIdx = 0;
        let bestPairOverall = -Infinity;
        for (let i = 0; i < detailedPairs.length; i++) {
          const { a, b } = detailedPairs[i];
          const combined = (a.overall ?? 0) + (b.overall ?? 0);
          if (combined > bestPairOverall) {
            bestPairOverall = combined;
            bestPairIdx = i;
          }
        }
        attachedToPairIdx = bestPairIdx;
      }

      if (method === "greedy") {
        warnings.push("Pairing optimized for speed at 13+ advisors — high quality but may not be globally optimal.");
      }

      return { pairs: detailedPairs, listener, attachedToPairIdx, method, warnings, totalScore };
    }

    // Format pairings as plain text for clipboard (Slack/email/whiteboard)
    function pairingsToText(result) {
      const lines = [];
      lines.push("PEER-PITCH PAIRINGS");
      lines.push("===================");
      lines.push("");
      result.pairs.forEach((p, i) => {
        const pairNum = i + 1;
        let line = `Pair ${pairNum}: ${p.a.name} ↔ ${p.b.name}`;
        if (result.listener && result.attachedToPairIdx === i) {
          line += ` (with ${result.listener.name} as listener)`;
        }
        lines.push(line);
        lines.push(`   ${p.action}`);
        lines.push("");
      });
      if (result.listener && result.attachedToPairIdx === null) {
        lines.push(`Listener: ${result.listener.name} — observes any pair this round.`);
      }
      return lines.join("\n");
    }


    function MyTeamView({ currentUser, profiles, allReports, onRefresh }) {
      const [pairing, setPairing] = useState(null);
      const [pairingOpen, setPairingOpen] = useState(false);

      // All views below filter to PITCH reports only — Objections drills are practice and don't count.
      const pitchReports = useMemo(() => allReports.filter(isPitchReport), [allReports]);

      // Build per-advisor stats
      const teamData = useMemo(() => {
        return profiles.map(p => {
          const theirReports = pitchReports.filter(r => r.userId === p.id);
          const averages = computeCategoryAverages(theirReports);
          const { strengths, growth } = getStrengthsAndGrowth(averages);
          const allScores = Object.values(averages).filter(v => v !== null);
          const overall = allScores.length > 0 ? allScores.reduce((a, b) => a + b, 0) / allScores.length : null;
          return {
            userId: p.id,
            email: p.email,
            name: p.name || nameFromEmailLocal(p.email),
            reportCount: theirReports.length,
            averages,
            strengths,
            growth,
            overall,
            isMe: p.id === currentUser.id,
          };
        });
      }, [profiles, pitchReports, currentUser.id]);

      // Team-wide aggregate category breakdown (excludes Objections drills)
      const teamBreakdown = useMemo(() => {
        return computeCategoryBreakdown(pitchReports);
      }, [pitchReports]);

      // Trailing 90-day leaderboard — pitches only
      // Window slides forward each day so it always reflects the most recent 90 days.
      const monthlyLeaderboard = useMemo(() => {
        const now = new Date();
        const NINETY_DAYS_MS = 90 * 24 * 60 * 60 * 1000;
        const cutoff = now.getTime() - NINETY_DAYS_MS;
        const periodLabel = "Last 90 Days";
        const MIN_SESSIONS_FOR_RANKING = 3;

        const standings = profiles.map(p => {
          const periodReports = pitchReports.filter(r => r.userId === p.id && r.createdAt >= cutoff && Object.keys(r.card?.scores || {}).length > 0);
          // Use difficulty-ADJUSTED scores so Hard pitches are weighted more, Easy less.
          const overallScores = periodReports
            .map(r => getAdjustedScore(r))
            .filter(s => s !== null);
          const avg = overallScores.length > 0 ? overallScores.reduce((a, b) => a + b, 0) / overallScores.length : null;
          return {
            userId: p.id,
            email: p.email,
            name: p.name || nameFromEmailLocal(p.email),
            sessionCount: periodReports.length,
            avg,
            isMe: p.id === currentUser.id,
            qualified: periodReports.length >= MIN_SESSIONS_FOR_RANKING && avg !== null,
          };
        });

        // Rank: qualified advisors by avg (descending), then by session count.
        // Cap at top 3 — only the podium is shown on the leaderboard.
        const ranked = standings
          .filter(s => s.qualified)
          .sort((a, b) => {
            if (b.avg !== a.avg) return b.avg - a.avg;
            return b.sessionCount - a.sessionCount;
          })
          .slice(0, 3);
        const unranked = standings.filter(s => !s.qualified && s.sessionCount > 0);
        const inactive = standings.filter(s => s.sessionCount === 0);

        // Keep the field name `monthName` for backward compatibility with the UI but use the period label.
        return { monthName: periodLabel, ranked, unranked, inactive, minSessions: MIN_SESSIONS_FOR_RANKING };
      }, [profiles, allReports, currentUser.id]);

      const me = teamData.find(t => t.isMe);
      const others = teamData.filter(t => !t.isMe);

      const handlePairMe = () => {
        if (!me || me.reportCount === 0) {
          alert("Complete at least one pitch session before finding a pairing partner.");
          return;

        const match = findBestPairing(me, teamData);
        if (!match) {

          return;

        setPairing({ me, match });
        setPairingOpen(true);

      // Has the team logged any scored sessions at all?
      const hasTeamData = pitchReports.length > 0;

      return (

          {teamData.length === 0 && (

          {/* Trailing 90-Day Leaderboard — Top 3 podium only */}
          {teamData.length > 0 && (
            <div className="mb-10">
              <div className="flex items-baseline justify-between mb-4 flex-wrap gap-2">
                <h2 className="font-display text-2xl">{monthlyLeaderboard.monthName} Leaderboard</h2>

              {monthlyLeaderboard.ranked.length === 0 && monthlyLeaderboard.unranked.length === 0 && (

              {/* Not yet qualified */}

                        <div>
                          <span className={s.isMe ? "font-display text-[var(--gold)]" : ""}>{s.name}</span>
                          {s.isMe && <span className="text-[10px] uppercase tracking-[0.18em] text-[var(--gold)] ml-2">You</span>}
                        </div>
                        <div className="text-xs text-[var(--ink)]/60">
                          {s.sessionCount} {s.sessionCount === 1 ? "session" : "sessions"} · {monthlyLeaderboard.minSessions - s.sessionCount} more to qualify
                        </div>
                      </div>
                    ))}
                  </div>
                </details>
              )}
            </div>
          )}

          {/* Team-wide Section Analysis */}
          {hasTeamData && (
            <div className="mb-10">
              <div className="flex items-baseline justify-between mb-4 flex-wrap gap-2">
                <h2 className="font-display text-2xl">Team Section Analysis</h2>
                <p className="text-xs text-[var(--ink)]/50">Aggregate across all advisors · all-time vs last 90 days</p>
              </div>
              <CategoryBreakdownGrid breakdown={teamBreakdown} />
            </div>
          )}

          {/* Your own card highlighted */}
          {me && (
            <div className="mb-6">
              <div className="text-[10px] uppercase tracking-[0.25em] text-[var(--gold)] mb-3">You</div>
              <AdvisorCard data={me} highlighted />
            </div>
          )}

          {/* Rest of team */}
          {others.length > 0 && (
            <div>
              <div className="text-[10px] uppercase tracking-[0.25em] text-[var(--ink)]/50 mb-3">Teammates</div>
              <div className="space-y-4">
                {others.map(t => <AdvisorCard key={t.userId} data={t} />)}
              </div>
            </div>
          )}

          {pairingOpen && pairing && (

        </div>

    }

    // ======================================================================
    // MANAGER ACCESS — hidden, password-gated

    // The password is intentionally in the front-end. This is a UX gate, not a real security boundary.
    // The Supabase RLS already permits authenticated users to read all reports (needed for My Team).
    // For real security upgrade later: add a `role` column to profiles + RLS policies that gate manager actions.
    const MANAGER_PASSWORD = "SilkTower?192";

    function ManagerPasswordModal({ onUnlock, onClose }) {
      const [pw, setPw] = useState("");
      const [error, setError] = useState("");
      const inputRef = useRef(null);

      useEffect(() => {
        // Auto-focus the password field
        const t = setTimeout(() => inputRef.current?.focus(), 50);
        return () => clearTimeout(t);
      }, []);

      const submit = () => {
        if (pw === MANAGER_PASSWORD) {
          onUnlock();
        } else {
          setError("Incorrect password.");
          setPw("");
          inputRef.current?.focus();
        }
      };

      const handleKey = (e) => {
        if (e.key === "Enter") { e.preventDefault(); submit(); }
        if (e.key === "Escape") { e.preventDefault(); onClose(); }
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-6" style={{ background: "rgba(33, 101, 97, 0.4)", backdropFilter: "blur(4px)" }} onClick={onClose}>
          <div className="card w-full max-w-md p-8 fade-up" onClick={e => e.stopPropagation()}>

              <div className="w-10 h-10 rounded-full flex items-center justify-center" style={{ background: "rgba(33, 101, 97, 0.1)" }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M7 11V7a5 5 0 0110 0v4"></path>
                  <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                </svg>
              </div>
              <div>
                <div className="text-[10px] uppercase tracking-[0.25em] text-[var(--gold)]">Restricted</div>
                <div className="font-display text-xl">Manager Access</div>
              </div>
            </div>
            <p className="text-sm text-[var(--ink)]/60 mb-6 leading-relaxed">
              Enter the manager password to view all advisors' report cards and full session data.
            </p>
            <input
              ref={inputRef}
              type="password"
              value={pw}
              onChange={e => { setPw(e.target.value); setError(""); }}
              onKeyDown={handleKey}
              placeholder="Manager password"
              className="input-field w-full px-4 py-3 rounded text-sm mb-3"
            />
            {error && <div className="text-xs text-[var(--accent)] mb-3">{error}</div>}
            <div className="flex justify-end gap-3 mt-2">
              <button onClick={onClose} className="btn-ghost px-5 py-2.5 rounded text-xs uppercase tracking-[0.18em]">
                Cancel
              </button>
              <button onClick={submit} disabled={!pw} className="btn-primary px-5 py-2.5 rounded text-xs uppercase tracking-[0.18em]">
                Unlock
              </button>

        // Use difficulty-ADJUSTED scores for all aggregate stats (consistent with leaderboard).
        const scoresPerReport = reportsWithScores

        const overallAvg = scoresPerReport.length > 0

          {managerMode === "individual" && (<>

          {/* Selected advisor's data */}
          {selected && (
            <div className="fade-up">
              {/* Identity block */}
              <div className="card-warm p-5 mb-6 flex items-center gap-4">

                <div>

                  <div className="text-xs text-[var(--ink)]/60 font-mono">{selected.email}</div>
                </div>
              </div>

              {/* Stats filter toggle — same as the personal Report Cards page */}
              <div className="card p-4 mb-6 flex items-center justify-between flex-wrap gap-3">
                <div className="min-w-0">
                  <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--ink)]/60 mb-0.5">Score stats include</div>
                  <div className="text-xs text-[var(--ink)]/50">
                    {includePractice
                      ? "Pitches + Practice + Curriculum sessions"
                      : "Pitches only — Practice and Curriculum are excluded by default"}
                  </div>
                </div>
                <div className="mode-toggle shrink-0">
                  <button
                    onClick={() => setIncludePractice(false)}
                    className={!includePractice ? "active" : ""}
                  >
                    Pitches Only
                  </button>
                  <button
                    onClick={() => setIncludePractice(true)}
                    className={includePractice ? "active" : ""}
                  >
                    Include Practice & Curriculum

              {/* Stats grid */}

                      <div className="text-xs text-[var(--ink)]/60">Across {stats.totalCount} {stats.totalCount === 1 ? "session" : "sessions"}</div>

                    <div className="card p-5">

                    <p className="text-sm text-[var(--ink)]/50">This advisor hasn't completed any sessions.</p>
                  </div>
                ) : (
                  <div className="grid md:grid-cols-2 gap-4">
                    {advisorReports.map(r => (
                      <ReportCardSummary key={r.id} report={r} onView={() => onViewReport(r.id)} />

          </>)}

    // ======================================================================
    // TEAM REPORTS VIEW — team-level stats, charts, ranking, and pairing
    // ======================================================================

    function TeamReportsView({ profiles, allReports, advisorOptions }) {
      // Toggle: include Practice + Curriculum in stats and charts? Default OFF.
      // Pairing logic ALWAYS uses Pitches Only regardless of this toggle.
      const [includePractice, setIncludePractice] = useState(false);

      // Section dropdown for team score chart — null means "all sections combined"
      const [chartSection, setChartSection] = useState(null);

      // Pairing state
      const [selectedAdvisorIds, setSelectedAdvisorIds] = useState(new Set());
      const [pairingResult, setPairingResult] = useState(null);
      const [pairingLoading, setPairingLoading] = useState(false);
      const [shuffleSeed, setShuffleSeed] = useState(0);
      const [copyConfirm, setCopyConfirm] = useState(false);

      // Keep state when profile list changes
      useEffect(() => {
        // Drop any selected IDs that are no longer in the profiles list
        setSelectedAdvisorIds(prev => {
          const valid = new Set(profiles.map(p => p.id));
          const next = new Set();
          prev.forEach(id => { if (valid.has(id)) next.add(id); });
          return next;
        });
      }, [profiles]);

      // ---- Filtered reports for stats/charts (toggleable) ----
      const filteredReports = useMemo(() =>
        allReports.filter(r => shouldCountForPersonalStats(r, includePractice) && Object.keys(r.card?.scores || {}).length > 0),
        [allReports, includePractice]
      );

      // ---- Pitches-only reports (used for pairing match scoring, always) ----
      const pitchOnlyReports = useMemo(() =>
        allReports.filter(r => isPitchReport(r) && Object.keys(r.card?.scores || {}).length > 0),
        [allReports]
      );

      // ---- Top-line team stats (uses filteredReports) ----
      const teamStats = useMemo(() => {
        if (filteredReports.length === 0) return { hasData: false };

        // Use difficulty-ADJUSTED scores everywhere — consistent with leaderboard math.
        const reportScores = filteredReports
          .map(r => getAdjustedScore(r))
          .filter(s => s !== null);

        const overallAvg = reportScores.length > 0
          ? reportScores.reduce((a, b) => a + b, 0) / reportScores.length
          : null;

        const cutoff = Date.now() - 90 * 24 * 60 * 60 * 1000;
        const recentReports = filteredReports.filter(r => r.createdAt >= cutoff);
        const recentScores = recentReports
          .map(r => getAdjustedScore(r))
          .filter(s => s !== null);
        const last30Avg = recentScores.length > 0
          ? recentScores.reduce((a, b) => a + b, 0) / recentScores.length
          : null;

        return {
          hasData: true,
          overallAvg,
          last30Avg,
          totalSessions: filteredReports.length,
          recentSessions: recentReports.length,
        };
      }, [filteredReports]);

      // ---- Per-advisor team data (for ranking + pairing) ----
      // Pairing uses Pitches-Only data always, but ranking uses the toggleable filtered set.
      const advisorRankingData = useMemo(() => {
        return profiles.map(p => {
          const theirReports = filteredReports.filter(r => r.userId === p.id);
          // Adjusted scores for ranking
          const allScores = theirReports
            .map(r => getAdjustedScore(r))
            .filter(s => s !== null);
          const overall = allScores.length > 0 ? allScores.reduce((a, b) => a + b, 0) / allScores.length : null;
          const cutoff = Date.now() - 90 * 24 * 60 * 60 * 1000;
          const recentReports = theirReports.filter(r => r.createdAt >= cutoff);
          const recentScores = recentReports
            .map(r => getAdjustedScore(r))
            .filter(s => s !== null);
          const last30 = recentScores.length > 0 ? recentScores.reduce((a, b) => a + b, 0) / recentScores.length : null;
          return {
            userId: p.id,
            email: p.email,
            name: p.name || nameFromEmailLocal(p.email),
            sessionCount: theirReports.length,
            overall,
            last30,
          };
        }).sort((a, b) => (b.overall ?? -1) - (a.overall ?? -1));
      }, [profiles, filteredReports]);

      // ---- Per-advisor profiles for PAIRING (always Pitches Only) ----
      const pairingProfiles = useMemo(() => {
        return profiles.map(p => {
          const theirReports = pitchOnlyReports.filter(r => r.userId === p.id);
          const averages = computeCategoryAverages(theirReports);
          const { strengths, growth } = getStrengthsAndGrowth(averages);
          const allScores = Object.values(averages).filter(v => v !== null);
          const overall = allScores.length > 0 ? allScores.reduce((a, b) => a + b, 0) / allScores.length : null;
          return {
            userId: p.id,
            email: p.email,
            name: p.name || nameFromEmailLocal(p.email),
            reportCount: theirReports.length,
            averages,
            strengths,
            growth,
            overall,
          };
        });
      }, [profiles, pitchOnlyReports]);

      // ---- Chart 1: Weekly session count ----
      const sessionVolumeChart = useMemo(() => {
        if (filteredReports.length === 0) return null;
        return computeWeeklyBuckets(filteredReports, (reports) => reports.length);
      }, [filteredReports]);

      // ---- Chart 2: Weekly team score (with optional section filter) ----
      const teamScoreChart = useMemo(() => {
        if (filteredReports.length === 0) return null;
        return computeWeeklyBuckets(filteredReports, (reports) => {
          // For each week, average each advisor's average for that week, then average across advisors.
          // (This keeps a single high-volume advisor from dominating the curve.)
          const byUser = new Map();
          for (const r of reports) {
            let score;
            if (chartSection) {
              // Single-category score — stays RAW. (Per-category scores are diagnostic;
              // difficulty multiplier doesn't apply to specific categories.)
              const s = r.card?.scores?.[chartSection]?.score;
              score = (typeof s === "number" && s > 0) ? s : null;
            } else {
              // "All sections" view: use difficulty-ADJUSTED overall score
              score = getAdjustedScore(r);
            }
            if (score === null) continue;
            if (!byUser.has(r.userId)) byUser.set(r.userId, []);
            byUser.get(r.userId).push(score);
          }
          if (byUser.size === 0) return null;
          const userAvgs = Array.from(byUser.values()).map(arr => arr.reduce((a, b) => a + b, 0) / arr.length);
          return userAvgs.reduce((a, b) => a + b, 0) / userAvgs.length;
        });
      }, [filteredReports, chartSection]);

      // ---- Pairing handlers ----
      const toggleAdvisor = (id) => {
        setSelectedAdvisorIds(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
        setPairingResult(null); // Invalidate previous pairing if selection changes
      };

      const selectAll = () => {
        setSelectedAdvisorIds(new Set(profiles.map(p => p.id)));
        setPairingResult(null);
      };
      const clearAll = () => {
        setSelectedAdvisorIds(new Set());
        setPairingResult(null);
      };

      const generatePairings = (shuffle = false) => {
        if (selectedAdvisorIds.size < 2) {
          alert("Select at least 2 advisors to generate pairings.");
          return;
        }
        setPairingLoading(true);
        setPairingResult(null);

        // Defer the actual computation so the UI can render the loading state
        setTimeout(() => {
          try {
            let selected = pairingProfiles.filter(p => selectedAdvisorIds.has(p.userId));
            // For shuffle: randomize order before pairing so greedy picks differently;
            // for exhaustive, this also explores alternative optimal pairings since
            // there can be ties.
            if (shuffle) {
              selected = [...selected];
              for (let i = selected.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [selected[i], selected[j]] = [selected[j], selected[i]];
              }
            }
            const result = generateTeamPairings(selected);
            setPairingResult(result);
            setShuffleSeed(s => s + 1);
          } catch (e) {
            console.error("Pairing failed", e);
            alert("Pairing failed: " + e.message);
          } finally {
            setPairingLoading(false);
          }
        }, 30); // small delay so spinner shows for snappy UX feedback
      };

      const copyToClipboard = async () => {
        if (!pairingResult) return;
        const text = pairingsToText(pairingResult);
        try {
          await navigator.clipboard.writeText(text);
          setCopyConfirm(true);
          setTimeout(() => setCopyConfirm(false), 2500);
        } catch {
          // Fallback: open a prompt
          window.prompt("Copy pairings text:", text);
        }
      };

      const printPage = () => {
        window.print();
      };

      const selectedCount = selectedAdvisorIds.size;
      const sectionLabel = chartSection ? (RUBRIC_LABELS[chartSection] || chartSection) : "All sections";

      return (
        <div className="fade-up">
          {/* Filter toggle (data) */}
          <div className="card p-4 mb-6 flex items-center justify-between flex-wrap gap-3 no-print">
            <div className="min-w-0">
              <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--ink)]/60 mb-0.5">Stats &amp; charts include</div>
              <div className="text-xs text-[var(--ink)]/50">
                {includePractice
                  ? "Pitches + Practice + Curriculum sessions"
                  : "Pitches only — Practice and Curriculum are excluded by default"}
              </div>
              <div className="text-[10px] text-[var(--ink)]/40 mt-1 italic">Pairing always uses Pitches Only — practice scores would muddy the strength/weakness signal.</div>
            </div>
            <div className="mode-toggle shrink-0">
              <button
                onClick={() => setIncludePractice(false)}
                className={!includePractice ? "active" : ""}
              >
                Pitches Only
              </button>
              <button
                onClick={() => setIncludePractice(true)}
                className={includePractice ? "active" : ""}
              >
                Include Practice &amp; Curriculum
              </button>
            </div>
          </div>

          {/* Print button */}
          <div className="mb-6 flex justify-end no-print">
            <button onClick={printPage} className="btn-ghost px-5 py-2.5 rounded text-xs uppercase tracking-[0.18em]">
              🖨 Print / Save PDF
            </button>
          </div>

          {/* Top stats */}
          {teamStats.hasData ? (
            <div className="grid md:grid-cols-4 gap-4 mb-8 print-keep-together">
              <div className="card p-5">
                <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--ink)]/50 mb-2">Team Average</div>
                <div className="font-display text-4xl mb-1" style={{ color: "var(--gold)" }}>{teamStats.overallAvg.toFixed(1)}</div>
                <div className="text-xs text-[var(--ink)]/60">All-time, across team</div>
              </div>
              <div className="card p-5">
                <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--ink)]/50 mb-2">Last 90 Days</div>
                <div className="font-display text-4xl mb-1">{teamStats.last30Avg ? teamStats.last30Avg.toFixed(1) : "—"}</div>
                <div className="text-xs text-[var(--ink)]/60">{teamStats.recentSessions} {teamStats.recentSessions === 1 ? "session" : "sessions"}</div>
              </div>
              <div className="card p-5">
                <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--ink)]/50 mb-2">Trend</div>
