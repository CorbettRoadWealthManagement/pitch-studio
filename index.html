    // ======================================================================
    // WEEKLY BUCKET HELPER + LINE CHART COMPONENT
    // ======================================================================

    // Group reports into weekly buckets (Mon-start), then apply an aggregator
    // function to each bucket. Returns { points: [{ weekStart, value, count }, ...] }.
    function computeWeeklyBuckets(reports, aggregator) {
      if (reports.length === 0) return null;

      // Find the date range
      const dates = reports.map(r => r.createdAt).sort((a, b) => a - b);
      const firstDate = new Date(dates[0]);
      const lastDate = new Date(dates[dates.length - 1]);

      // Round first date down to the previous Monday
      function startOfWeek(d) {
        const dt = new Date(d);
        dt.setHours(0, 0, 0, 0);
        const day = dt.getDay(); // 0 = Sun, 1 = Mon...
        const diff = (day === 0 ? -6 : 1 - day); // shift to Mon
        dt.setDate(dt.getDate() + diff);
        return dt;
      }

      const firstWeek = startOfWeek(firstDate);
      const lastWeek = startOfWeek(lastDate);

      // Build the list of weeks
      const weeks = [];
      const cursor = new Date(firstWeek);
      while (cursor <= lastWeek) {
        weeks.push(new Date(cursor));
        cursor.setDate(cursor.getDate() + 7);
      }

      // Bucket reports
      const buckets = weeks.map(w => {
        const weekEnd = new Date(w);
        weekEnd.setDate(weekEnd.getDate() + 7);
        const inWeek = reports.filter(r => r.createdAt >= w.getTime() && r.createdAt < weekEnd.getTime());
        const value = aggregator(inWeek);
        return { weekStart: w, value, count: inWeek.length };
      });

      // Cap at the most recent 12 weeks for readability if longer
      const points = buckets.length > 12 ? buckets.slice(-12) : buckets;

      return { points };
    }

    // Generic SVG line chart with hover tooltips.
    function WeeklyLineChart({ data, yLabel, decimals = 1, yMin = null, yMax = null }) {
      const [hoverIdx, setHoverIdx] = useState(null);
      const points = data?.points || [];

      if (points.length < 2) {
        return (
          <div className="text-center py-8 text-sm text-[var(--ink)]/40 italic">
            Need at least 2 weeks of data for a trend.
          </div>
        );
      }

      // Width / height
      const width = 720;
      const height = 220;
      const padX = 50;
      const padY = 24;
      const innerW = width - padX * 2;
      const innerH = height - padY * 2;

      // Y range — auto-fit unless yMin/yMax provided
      const validVals = points.map(p => p.value).filter(v => v !== null);
      const dataMin = validVals.length > 0 ? Math.min(...validVals) : 0;
      const dataMax = validVals.length > 0 ? Math.max(...validVals) : 1;
      const lo = yMin !== null ? yMin : Math.max(0, Math.floor(dataMin - 1));
      const hi = yMax !== null ? yMax : Math.ceil(dataMax + 1);
      const range = Math.max(hi - lo, 1);

      const xFor = i => padX + (points.length === 1 ? innerW / 2 : (i / (points.length - 1)) * innerW);
      const yFor = v => padY + innerH - ((v - lo) / range) * innerH;

      // Build SVG path skipping null gaps
      const pathSegments = [];
      let current = "";
      points.forEach((p, i) => {
        if (p.value === null) {
          if (current) { pathSegments.push(current); current = ""; }
        } else {
          const x = xFor(i);
          const y = yFor(p.value);
          if (!current) current = `M ${x.toFixed(1)} ${y.toFixed(1)}`;
          else current += ` L ${x.toFixed(1)} ${y.toFixed(1)}`;
        }
      });
      if (current) pathSegments.push(current);

      // Area fill: build a closed polygon for each contiguous segment
      const areaSegments = [];
      let firstIdx = null;
      for (let i = 0; i < points.length; i++) {
        if (points[i].value === null) {
          if (firstIdx !== null) {
            const segPts = points.slice(firstIdx, i).map((p, k) => `${xFor(firstIdx + k).toFixed(1)},${yFor(p.value).toFixed(1)}`).join(" ");
            const x0 = xFor(firstIdx);
            const xN = xFor(i - 1);
            areaSegments.push(`M ${x0.toFixed(1)} ${(padY + innerH).toFixed(1)} L ${segPts.split(" ").join(" L ")} L ${xN.toFixed(1)} ${(padY + innerH).toFixed(1)} Z`);
            firstIdx = null;
          }
        } else if (firstIdx === null) {
          firstIdx = i;
        }
      }
      if (firstIdx !== null) {
        const segPts = points.slice(firstIdx).map((p, k) => `${xFor(firstIdx + k).toFixed(1)},${yFor(p.value).toFixed(1)}`).join(" ");
        const x0 = xFor(firstIdx);
        const xN = xFor(points.length - 1);
        areaSegments.push(`M ${x0.toFixed(1)} ${(padY + innerH).toFixed(1)} L ${segPts.split(" ").join(" L ")} L ${xN.toFixed(1)} ${(padY + innerH).toFixed(1)} Z`);
      }

      const formatWeek = (d) => {
        const date = new Date(d);
        return `${date.getMonth() + 1}/${date.getDate()}`;
      };

      // Y-axis ticks (4-5 of them)
      const tickCount = 4;
      const ticks = [];
      for (let i = 0; i <= tickCount; i++) {
        const v = lo + (range * i / tickCount);
        ticks.push({ v, y: yFor(v) });
      }

      return (
        <div className="relative">
          <svg viewBox={`0 0 ${width} ${height}`} width="100%" height={height} preserveAspectRatio="xMidYMid meet">
            {/* Y-axis ticks/grid */}
            {ticks.map((t, i) => (
              <g key={i}>
                <line x1={padX} y1={t.y} x2={width - padX} y2={t.y} stroke="var(--rule)" strokeWidth="0.5" strokeDasharray={i === 0 ? "" : "2,3"} />
                <text x={padX - 8} y={t.y + 4} textAnchor="end" fontSize="10" fill="var(--ink)" opacity="0.5">
                  {decimals === 0 ? Math.round(t.v) : t.v.toFixed(decimals)}
                </text>
              </g>
            ))}

            {/* Area fill */}
            {areaSegments.map((d, i) => (
              <path key={i} d={d} fill="var(--gold)" fillOpacity="0.1" />
            ))}

            {/* Line */}
            {pathSegments.map((d, i) => (
              <path key={i} d={d} stroke="var(--teal)" strokeWidth="2" fill="none" />
            ))}

            {/* Points */}
            {points.map((p, i) => {
              if (p.value === null) return null;
              const x = xFor(i);
              const y = yFor(p.value);
              const isHover = hoverIdx === i;
              return (
                <g key={i}>
                  <circle
                    cx={x}
                    cy={y}
                    r={isHover ? 6 : 4}
                    fill="var(--teal)"
                    stroke="white"
                    strokeWidth="2"
                    style={{ transition: "r 0.15s ease" }}
                  />
                  <rect
                    x={x - 18}
                    y={padY}
                    width={36}
                    height={innerH}
                    fill="transparent"
                    onMouseEnter={() => setHoverIdx(i)}
                    onMouseLeave={() => setHoverIdx(null)}
                  />
                </g>
              );
            })}

            {/* X-axis labels */}
            {points.map((p, i) => {
              // Only show labels at intervals so they don't overlap
              const showLabel = points.length <= 6 || i === 0 || i === points.length - 1 || i % Math.ceil(points.length / 6) === 0;
              if (!showLabel) return null;
              return (
                <text key={i} x={xFor(i)} y={height - 6} textAnchor="middle" fontSize="9" fill="var(--ink)" opacity="0.5">
                  {formatWeek(p.weekStart)}
                </text>
              );
            })}
          </svg>

          {/* Hover tooltip */}
          {hoverIdx !== null && points[hoverIdx] && points[hoverIdx].value !== null && (
            <div
              className="absolute pointer-events-none px-3 py-2 rounded text-xs"
              style={{
                left: `${(xFor(hoverIdx) / width) * 100}%`,
                top: `${(yFor(points[hoverIdx].value) / height) * 100}%`,
                transform: "translate(-50%, calc(-100% - 12px))",
                background: "var(--ink)",
                color: "white",
                whiteSpace: "nowrap",
              }}
            >
              <div className="font-display">Week of {formatWeek(points[hoverIdx].weekStart)}</div>
              <div>{yLabel}: <strong>{decimals === 0 ? Math.round(points[hoverIdx].value) : points[hoverIdx].value.toFixed(decimals)}</strong></div>
              <div className="text-[10px] opacity-70">{points[hoverIdx].count} {points[hoverIdx].count === 1 ? "session" : "sessions"} that week</div>
            </div>
          )}
        </div>
      );
    }

    function App() {

      const [user, setUser] = useState(null); // Supabase user, populated by auth listener
      const [authLoading, setAuthLoading] = useState(true); // true while we check the initial session
      const [apiKey, setApiKey] = useState(() => storage.get(STORAGE_KEYS.apiKey, ""));
      const [reports, setReports] = useState(() => storage.get(STORAGE_KEYS.reports, []));
      const [reportsLoading, setReportsLoading] = useState(false);
      const [teamProfiles, setTeamProfiles] = useState([]);
      const [teamReports, setTeamReports] = useState([]);
      const [mode, setMode] = useState("pitch");
      const [activePersona, setActivePersona] = useState(null);
      const [activeReportId, setActiveReportId] = useState(null);
      const [grading, setGrading] = useState(false);
      const [voices, setVoices] = useState([]);
      const [preferredVoice, setPreferredVoice] = useState(() => storage.get(STORAGE_KEYS.preferredVoice, ""));
      const [speechRate, setSpeechRateState] = useState(() => {
        const saved = storage.get(STORAGE_KEYS.speechRate, 1.0);
        const n = typeof saved === "number" ? saved : parseFloat(saved);
        return (!isNaN(n) && n >= 0.5 && n <= 2.0) ? n : 1.0;
      });
      const setSpeechRate = (rate) => {
        const safe = Math.max(0.5, Math.min(2.0, rate));
        setSpeechRateState(safe);
        storage.set(STORAGE_KEYS.speechRate, safe);
      };
      const [chromeConfirmed, setChromeConfirmed] = useState(() => storage.get(STORAGE_KEYS.chromeConfirmed, false));

      // ===== Manager mode (hidden, password-gated) =====
      // Per-session unlock — clears when the tab closes (sessionStorage).
      const [managerUnlocked, setManagerUnlocked] = useState(() => {
        try { return sessionStorage.getItem("crpt_mgr_unlocked") === "1"; } catch { return false; }
      });
      const [managerPwModalOpen, setManagerPwModalOpen] = useState(false);
      const [managerSelectedAdvisorId, setManagerSelectedAdvisorId] = useState(null);
      const [cameFromManager, setCameFromManager] = useState(false); // tracks if a report card was opened from manager view

      const lockManager = () => {
        try { sessionStorage.removeItem("crpt_mgr_unlocked"); } catch {}
        setManagerUnlocked(false);
        setManagerSelectedAdvisorId(null);
        setCameFromManager(false);
        if (view === "manager") setView("dashboard");
      };

      const unlockManager = () => {
        try { sessionStorage.setItem("crpt_mgr_unlocked", "1"); } catch {}
        setManagerUnlocked(true);
        setManagerPwModalOpen(false);
        // Make sure team data is loaded so the manager view has profiles + reports
        loadTeamData();
        setView("manager");
      };

      // Global keyboard shortcut: Ctrl+Alt+M (or Cmd+Alt+M on Mac) opens the password prompt.
      // Note: Chrome reserves Ctrl+Shift+M for the profile picker, so we use Alt instead.
      // Only available when the user is signed in (otherwise the shortcut is a no-op).
      useEffect(() => {
        if (!user) return;
        const handler = (e) => {
          // Detect Ctrl+Alt+M or Cmd+Alt+M (case-insensitive on the M)
          const isModifier = (e.ctrlKey || e.metaKey) && e.altKey;
          if (isModifier && (e.key === "M" || e.key === "m" || e.code === "KeyM")) {
            e.preventDefault();
            e.stopPropagation();
            if (managerUnlocked) {
              // Already unlocked — just navigate there
              setView("manager");
              if (!teamProfiles.length || !teamReports.length) loadTeamData();
            } else {
              setManagerPwModalOpen(true);
            }
          }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [user, managerUnlocked, teamProfiles.length, teamReports.length]);

      // Load voices (browser quirk: voices populate asynchronously)
      useEffect(() => {
        const load = () => {
          const v = window.speechSynthesis.getVoices();
          if (v.length) setVoices(v);
        };
        load();
        window.speechSynthesis.onvoiceschanged = load;
      }, []);

      // ====================================================================
      // Supabase auth: listen for session changes
      // ====================================================================
      useEffect(() => {
        // Get initial session
        sb.auth.getSession().then(({ data }) => {
          if (data.session && data.session.user) {
            setUser(toAppUser(data.session.user));
          }
          setAuthLoading(false);
        });

        // Listen for changes
        const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
          if (session && session.user) {
            setUser(toAppUser(session.user));
          } else {
            setUser(null);
          }
        });

        return () => { subscription.unsubscribe(); };
      }, []);

      // ====================================================================
      // When user signs in: load report cards from cloud + migrate any local data
      // ====================================================================
      useEffect(() => {
        if (!user) return;

        let cancelled = false;
        (async () => {
          setReportsLoading(true);
          try {
            // Migrate local reports to cloud (one-time)
            await migrateLocalReportsIfNeeded(user.id);

            // Load all of this user's reports from cloud
            const cloudReports = await fetchUserReports(user.id);
            if (!cancelled) {
              setReports(cloudReports);
              storage.set(STORAGE_KEYS.reports, cloudReports);
            }
          } catch (e) {
            console.error("Failed to load cloud reports:", e);
            // Fall back to local cache
          } finally {
            if (!cancelled) setReportsLoading(false);
          }
        })();

        return () => { cancelled = true; };
      }, [user?.id]);

      // ====================================================================
      // Persistence (local cache only — cloud is authoritative for reports)
      // ====================================================================
      useEffect(() => { user ? storage.set(STORAGE_KEYS.user, user) : null; }, [user]);
      useEffect(() => { storage.set(STORAGE_KEYS.apiKey, apiKey); }, [apiKey]);
      useEffect(() => { storage.set(STORAGE_KEYS.reports, reports); }, [reports]);
      useEffect(() => { storage.set(STORAGE_KEYS.preferredVoice, preferredVoice); }, [preferredVoice]);
      useEffect(() => { storage.set(STORAGE_KEYS.chromeConfirmed, chromeConfirmed); }, [chromeConfirmed]);

      const handleSignOut = async () => {
        await sb.auth.signOut();
        // Auth listener will set user to null
      };

      const handleStartSession = () => {
        if (!apiKey) { setView("settings"); return; }
        if (mode === "spin") {
          setView("spin");
        } else {
          setView("persona-setup");
        }
      };

      const handleLaunchSession = (persona) => {
        setActivePersona(persona);
        setView("session");
      };

      // ====================================================================
      // Save spin drill session as a special report card
      // ====================================================================
      const handleSpinComplete = async (drillResults, difficulty) => {
        if (!drillResults || drillResults.length === 0) {
          setView("dashboard");
          return;
        }

        // Compute aggregate score (for display only — does NOT roll into rubric)
        const avgScore = drillResults.reduce((s, r) => s + r.score, 0) / drillResults.length;

        // Build a synthetic "report card" so it shows up in history.
        // IMPORTANT: card.scores is intentionally EMPTY {} — Objections drills are practice,
        // not pitches, and we don't want them to count toward the advisor's overall average,
        // section breakdowns, or the team leaderboard.
        const newReport = {
          id: "rpt_" + Date.now(),
          createdAt: Date.now(),
          mode: "spin",
          persona: {
            name: `Objections Drill (${difficulty})`,
            difficulty,
            notes: `${drillResults.length} ${drillResults.length === 1 ? "objection" : "objections"} drilled · avg ${avgScore.toFixed(1)}/10`,
          },
          transcript: drillResults.flatMap(r => [
            { role: "prospect", text: r.question.text, ts: Date.now() },
            { role: "advisor", text: r.response, ts: Date.now() + 1 },
          ]),
          card: {
            scores: {}, // intentionally empty — does not contribute to averages
            summary: `Drilled ${drillResults.length} ${difficulty}-difficulty ${drillResults.length === 1 ? "objection" : "objections"}. Average score: ${avgScore.toFixed(1)}/10. (Practice only — does not affect overall scores.)`,
            top_strengths: drillResults.filter(r => r.score >= 7).slice(0, 3).map(r => `Handled ${r.question.category}: "${r.question.text.slice(0, 60)}${r.question.text.length > 60 ? "..." : ""}"`),
            top_growth_areas: drillResults.filter(r => r.score <= 5).slice(0, 3).map(r => `Struggled with ${r.question.category}: "${r.question.text.slice(0, 60)}${r.question.text.length > 60 ? "..." : ""}"`),
            spinDrills: drillResults, // full per-question data for the review UI
            isObjectionsDrill: true, // explicit flag so views can tell drills apart
            drillAvgScore: avgScore,
          },
          voiceAnalytics: null,
        };

        // Save to cloud
        try {
          await saveReportToCloud(user.id, newReport);
        } catch (e) {
          console.error("Cloud save failed (saved locally):", e);
        }

        const updated = [newReport, ...reports];
        setReports(updated);
        setActiveReportId(newReport.id);
        setView("report-card");
      };

      const handleSessionComplete = async (transcript) => {
        if (!transcript || transcript.length < 2) {
          setView("dashboard");
          return;
        }
        setGrading(true);
        // Compute voice analytics from transcript
        const voiceAnalytics = computeVoiceAnalytics(transcript);
        try {
          const transcriptText = transcript.map(t => `${t.role === "advisor" ? "ADVISOR" : "PROSPECT"}: ${t.text}`).join("\n\n");
          const reply = await callGroq({
            apiKey,
            model: MODEL_GRADER,
            messages: [
              { role: "system", content: "You are a meticulous sales coach. Always return valid JSON." },
              { role: "user", content: buildGraderSystemPrompt(activePersona, transcriptText) },
            ],
            temperature: 0.3,
            jsonMode: true,
          });
          const card = JSON.parse(reply);
          const newReport = {
            id: "rpt_" + Date.now(),
            createdAt: Date.now(),
            mode,
            persona: activePersona,
            transcript,
            card,
            voiceAnalytics,
          };
          // Save to cloud
          try {
            await saveReportToCloud(user.id, newReport);
          } catch (e) {
            console.error("Cloud save failed (saved locally):", e);
          }
          // Update UI
          const updated = [newReport, ...reports];
          setReports(updated);
          setActiveReportId(newReport.id);
          setView("report-card");
        } catch (e) {
          alert("Couldn't generate report card: " + e.message + "\n\nThe transcript will still be saved locally.");
          const newReport = {
            id: "rpt_" + Date.now(),
            createdAt: Date.now(),
            mode,
            persona: activePersona,
            transcript,
            card: null,
            voiceAnalytics,
          };
          setReports([newReport, ...reports]);
          setView("dashboard");
        } finally {
          setGrading(false);
        }
      };

      // ====================================================================
      // Delete a report (from cloud + local state)
      // ====================================================================
      const handleDeleteReport = async (reportId) => {
        // If it's a local-only report (id starts with rpt_), just remove from state
        if (typeof reportId === "string" && reportId.startsWith("rpt_")) {
          setReports(prev => prev.filter(r => r.id !== reportId));
          return;
        }
        try {
          await deleteReportFromCloud(reportId);
          setReports(prev => prev.filter(r => r.id !== reportId));
        } catch (e) {
          throw new Error("Couldn't delete from cloud: " + e.message);
        }
      };

      // ====================================================================
      // Load team data when entering team view
      // ====================================================================
      const loadTeamData = async () => {
        try {
          const [profiles, allReports] = await Promise.all([
            fetchAllProfiles(),
            fetchAllReports(),
          ]);
          setTeamProfiles(profiles);
          setTeamReports(allReports);
        } catch (e) {
          console.error("Failed to load team data:", e);
        }
      };

      const navigateToTeam = async () => {
        setView("team");
        loadTeamData(); // fire and forget
      };

      // Look in own reports first; if in manager mode, also check teamReports (other advisors' reports)
      const activeReport = reports.find(r => r.id === activeReportId)
        || (managerUnlocked ? teamReports.find(r => r.id === activeReportId) : null);

      // ====================================================================
      // Routing
      // ====================================================================
      if (authLoading) {
        return (
          <div className="min-h-screen paper-bg flex items-center justify-center">
            <div className="text-sm text-[var(--ink)]/40 uppercase tracking-[0.2em]">Loading…</div>
          </div>
        );
      }

      if (!user) return <LoginView onSignIn={() => {}} />;

      // Browser check — happens once per browser, right after first login
      if (!chromeConfirmed) {
        return (
          <BrowserCheckModal
            user={user}
            onSignOut={handleSignOut}
            onConfirm={() => setChromeConfirmed(true)}
          />
        );
      }

      // First-time setup — runs once until they have a working key
      if (!apiKey) {
        return (
          <OnboardingView
            user={user}
            voices={voices}
            onSignOut={handleSignOut}
            onComplete={({ apiKey: newKey, voice }) => {
              setApiKey(newKey);
              if (voice) setPreferredVoice(voice);
              setView("dashboard");
            }}
          />
        );
      }

      if (grading) return <GradingView />;

      if (view === "session" && activePersona) {
        return (
          <SessionView
            apiKey={apiKey}
            mode={mode}
            persona={activePersona}
            voice={preferredVoice}
            speechRate={speechRate}
            onComplete={handleSessionComplete}
            onCancel={() => { stopSpeaking(); setView("dashboard"); setActivePersona(null); }}
          />
        );
      }

      if (view === "spin") {
        return (
          <SpinView
            apiKey={apiKey}
            voice={preferredVoice}
            speechRate={speechRate}
            onComplete={handleSpinComplete}
            onCancel={() => { stopSpeaking(); setView("dashboard"); }}
          />
        );
      }

      // Centralized navigation helper that routes special views correctly
      const handleNav = (v) => {
        if (v === "team") return navigateToTeam();
        if (v === "manager") {
          if (managerUnlocked) {
            setView("manager");
            if (!teamProfiles.length || !teamReports.length) loadTeamData();
          } else {
            setManagerPwModalOpen(true);
          }
          return;
        }
        setView(v);
      };

      return (
        <div className="min-h-screen paper-bg">
          {/* Manager-mode indicator strip — visible whenever the user is unlocked, on every page */}
          {managerUnlocked && (
            <div className="px-8 py-1.5 text-center text-[10px] uppercase tracking-[0.3em] font-medium" style={{ background: "#b8893a", color: "white", letterSpacing: "0.3em" }}>
              🔓 Manager Mode Active · Press Ctrl+Alt+M anytime · You can see all advisors' data
            </div>
          )}

          <TopNav user={user} onSignOut={handleSignOut} onNavigate={handleNav} currentView={view} managerUnlocked={managerUnlocked} />
          {view === "dashboard" && (
            <DashboardView
              user={user}
              mode={mode}
              setMode={setMode}
              reports={reports}
              onStartSession={handleStartSession}
              onViewReport={(id) => { if (id) { setCameFromManager(false); setActiveReportId(id); setView("report-card"); } else { setView("history"); } }}
              hasApiKey={!!apiKey}
            />
          )}
          {view === "history" && (
            <HistoryView
              reports={reports}
              onView={(id) => { setCameFromManager(false); setActiveReportId(id); setView("report-card"); }}
              onDelete={handleDeleteReport}
            />
          )}
          {view === "team" && (
            <MyTeamView
              currentUser={user}
              profiles={teamProfiles}
              allReports={teamReports}
              onRefresh={loadTeamData}
            />
          )}
          {view === "manager" && managerUnlocked && (
            <ManagerView
              profiles={teamProfiles}
              allReports={teamReports}
              selectedAdvisorId={managerSelectedAdvisorId}
              setSelectedAdvisorId={setManagerSelectedAdvisorId}
              onViewReport={(id) => { setCameFromManager(true); setActiveReportId(id); setView("report-card"); }}
              onLock={lockManager}
              onRefresh={loadTeamData}
            />
          )}
          {view === "settings" && (
            <SettingsView
              apiKey={apiKey}
              onSaveKey={setApiKey}
              onNavigate={setView}
              voices={voices}
              preferredVoice={preferredVoice}
              onSetVoice={setPreferredVoice}
              speechRate={speechRate}
              onSetSpeechRate={setSpeechRate}
            />
          )}
          {view === "persona-setup" && (
            <PersonaSetupView
              apiKey={apiKey}
              mode={mode}
              onLaunch={handleLaunchSession}
              onCancel={() => setView("dashboard")}
            />
          )}
          {view === "report-card" && activeReport && (
            <ReportCardView
              report={activeReport}
              onBack={() => {
                if (cameFromManager && managerUnlocked) {
                  setView("manager");
                  setCameFromManager(false);
                } else {
                  setView("dashboard");
                }
              }}
              user={user}
              allReports={reports}
              apiKey={apiKey}
              onDelete={handleDeleteReport}
            />
          )}

          {/* Manager password modal — appears when triggered by keyboard shortcut or tab click */}
          {managerPwModalOpen && (
            <ManagerPasswordModal
              onUnlock={unlockManager}
              onClose={() => setManagerPwModalOpen(false)}
            />
          )}
        </div>
      );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
