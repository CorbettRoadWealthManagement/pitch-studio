    }

    function ReportCardSummary({ report, onView, onDelete }) {
      // Drill sessions don't have rubric scores — show "—"
      const isDrill = report.card?.isObjectionsDrill || report.mode === "spin";
      const rawScore = getRawScore(report);
      const adjustedScore = getAdjustedScore(report);
      const difficulty = report.persona?.difficulty || "Medium";
      const multiplier = DIFFICULTY_MULTIPLIERS[difficulty] ?? 1.0;

      const adjustedDisplay = adjustedScore !== null ? adjustedScore.toFixed(1) : "—";
      const rawDisplay = rawScore !== null ? rawScore.toFixed(1) : "—";

      const date = new Date(report.createdAt).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
      const prospectName = report.persona?.name || "Anonymous prospect";

      // Difficulty badge color
      const diffColor = difficulty === "Hard" ? "var(--accent)" : difficulty === "Easy" ? "var(--gold-soft)" : "var(--ink)";

      const handleDelete = async (e) => {
        e.stopPropagation();
        const confirmed = window.confirm(`Delete the session with ${prospectName}? This cannot be undone.`);
        if (!confirmed) return;
        try {
          await onDelete(report.id);
        } catch (err) {
          alert("Couldn't delete: " + err.message);
        }
      };

      return (
        <div className="card p-6 hover:shadow-md transition-shadow w-full relative group">
          <button onClick={onView} className="block text-left w-full">
            <div className="flex items-start justify-between gap-4">
              <div className="min-w-0 pr-8">
                <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--ink)]/50 mb-1 flex items-center gap-1.5 flex-wrap">
                  <span>{date}</span>
                  <span className="text-[var(--ink)]/30">·</span>
                  <span>{report.mode}</span>
                  {!isDrill && (
                    <>
                      <span className="text-[var(--ink)]/30">·</span>
                      <span style={{ color: diffColor, fontWeight: 600 }}>{difficulty}</span>
                    </>
                  )}
                </div>
                <div className="font-display text-lg truncate">{prospectName}</div>
                <div className="text-xs text-[var(--ink)]/50 mt-1 truncate">{report.persona?.notes || `Age ${report.persona?.age || "?"} · ${report.persona?.primaryGoal || ""}`}</div>
              </div>
              <div className="text-right shrink-0">
                <div className="font-display text-3xl" style={{ color: "var(--gold)" }}>{adjustedDisplay}</div>
                <div className="text-[10px] uppercase tracking-[0.18em] text-[var(--ink)]/50">adjusted</div>
                {!isDrill && rawScore !== null && (
                  <div className="text-[10px] text-[var(--ink)]/40 mt-1.5 tabular-nums">
                    Raw {rawDisplay} · ×{multiplier}
                  </div>
                )}
              </div>
            </div>
          </button>
          {onDelete && (
            <button
              onClick={handleDelete}
              className="absolute top-3 right-3 w-7 h-7 rounded flex items-center justify-center text-[var(--ink)]/30 hover:text-[var(--accent)] hover:bg-red-50 transition-all opacity-0 group-hover:opacity-100"
              title="Delete this session"
              aria-label="Delete session"
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6l-2 14a2 2 0 01-2 2H9a2 2 0 01-2-2L5 6"></path>
                <path d="M10 11v6M14 11v6"></path>
                <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"></path>
              </svg>
            </button>
          )}
        </div>
      );
    }

    // ======================================================================
    // PERSONA SETUP VIEW
    // ======================================================================

    const EMPTY_PERSONA = {
      name: "", age: "", retirement: "", retirementGoals: "",
      currentStrategies: "", primaryGoal: "", comfortLevel: "",
      pullTime: "", monthlySavings: "", income: "", assets: "", notes: "",
      difficulty: "Medium",
      focusStep: null,
    };

    function PersonaSetupView({ apiKey, mode, onLaunch, onCancel }) {
      const [persona, setPersona] = useState(EMPTY_PERSONA);
      const [generating, setGenerating] = useState(false);
      const [error, setError] = useState("");
      // Curriculum mode: pick step first, then prospect
      const [curriculumStep, setCurriculumStep] = useState(null);
      const [curriculumPhase, setCurriculumPhase] = useState(mode === "curriculum" ? "pickStep" : "persona");

      const set = (k, v) => setPersona(p => ({ ...p, [k]: v }));

      const generate = async () => {
        setGenerating(true);
        setError("");
        try {
          // Read this user's recent persona history (last 5) so the model
          // can avoid generating something similar to what was just produced.
          const recentPersonas = getRecentPersonas();

          const reply = await callGroq({
            apiKey,
            model: MODEL_GRADER,
            messages: [{ role: "user", content: buildPersonaGenPrompt(recentPersonas) }],
            temperature: 1.0,
            jsonMode: true,
          });
          const parsed = JSON.parse(reply);
          // Preserve current difficulty + focusStep when generating
          setPersona(p => ({ ...EMPTY_PERSONA, ...parsed, difficulty: p.difficulty, focusStep: p.focusStep }));
          // Save to recent-history so the NEXT generation can avoid it
          pushRecentPersona(parsed);
        } catch (e) {
          setError("Couldn't generate a prospect. " + e.message);
        } finally {
          setGenerating(false);
        }
      };

      const launch = () => {
        const finalPersona = mode === "curriculum"
          ? { ...persona, focusStep: curriculumStep }
          : persona;
        onLaunch(finalPersona);
      };

      const fields = [
        // Short single-line fields, two columns
        { key: "name", label: "Name", placeholder: "e.g. Margaret Chen" },
        { key: "age", label: "Age", placeholder: "e.g. 58" },
        { key: "retirement", label: "Retirement timeframe", placeholder: "e.g. 7 years" },
        { key: "comfortLevel", label: "Investing comfort level", placeholder: "Conservative / Moderate / Aggressive" },
        { key: "pullTime", label: "Time to pulling money", placeholder: "e.g. 5–10 years" },
        { key: "monthlySavings", label: "Current monthly savings", placeholder: "e.g. $4,500" },
        { key: "income", label: "Current household income", placeholder: "e.g. $325,000" },
        { key: "assets", label: "Current investable assets", placeholder: "e.g. $1.8M" },
        // Longer sentence-style fields go last and span both columns so the full
        // content is visible without horizontal truncation.
        { key: "primaryGoal", label: "Primary financial goal", placeholder: "e.g. Maintain lifestyle, leave inheritance", multiline: true },
        { key: "retirementGoals", label: "What they want to do in retirement", placeholder: "e.g. Travel, spend time with grandchildren", multiline: true },
        { key: "currentStrategies", label: "Current investment strategies", placeholder: "e.g. 401k, individual stocks, savings", multiline: true },
      ];

      const modeLabel = mode === "pitch" ? "Pitch mode" : mode === "practice" ? "Practice mode" : "Curriculum mode";

      // ===== Curriculum: pick step first =====
      if (mode === "curriculum" && curriculumPhase === "pickStep") {
        return (
          <div className="max-w-4xl mx-auto px-8 py-12 fade-up">
            <button onClick={onCancel} className="text-xs uppercase tracking-[0.18em] text-[var(--ink)]/60 hover:text-[var(--ink)] mb-6">← Cancel</button>
            <div className="text-xs uppercase tracking-[0.25em] text-[var(--ink)]/50 mb-2">Curriculum mode · Step 1 of 2</div>
            <h1 className="font-display text-4xl mb-3">Which step do you want to practice?</h1>
            <p className="text-sm text-[var(--ink)]/60 max-w-2xl mb-8">
              Pick a single step of the seven-step pitch process. The session will be short and focused — the prospect will be primed to put you exactly at that point in the conversation, and grading will weight that step heavily.
            </p>

            <div className="grid md:grid-cols-2 gap-3">
              {Object.entries(CURRICULUM_STEPS).map(([key, step]) => (
                <button
                  key={key}
                  onClick={() => { setCurriculumStep(key); setCurriculumPhase("persona"); }}
                  className={`card p-5 text-left transition-all hover:shadow-md ${curriculumStep === key ? "ring-2 ring-[var(--gold)]" : ""}`}
                >
                  <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--gold)] mb-1">Step {step.order}</div>
                  <div className="font-display text-lg mb-1">{step.label}</div>
                  <div className="text-xs text-[var(--ink)]/60 leading-relaxed">{step.focus}</div>
                </button>
              ))}
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-4xl mx-auto px-8 py-12 fade-up">
          <button onClick={onCancel} className="text-xs uppercase tracking-[0.18em] text-[var(--ink)]/60 hover:text-[var(--ink)] mb-6">← Cancel</button>
          <div className="text-xs uppercase tracking-[0.25em] text-[var(--ink)]/50 mb-2">
            {modeLabel} · Step {mode === "curriculum" ? "2" : "1"} of 2
            {mode === "curriculum" && curriculumStep && (
              <> · Practicing <span className="text-[var(--gold)]">{CURRICULUM_STEPS[curriculumStep].label}</span></>
            )}
          </div>
          <h1 className="font-display text-4xl mb-3">Set up your prospect.</h1>
          <p className="text-sm text-[var(--ink)]/60 max-w-2xl mb-3">
            Fill in as much or as little as you'd like — the AI will invent realistic details for any gaps. Or click "Generate prospect" for a random scenario.
          </p>
          <p className="text-xs text-[var(--accent)] max-w-2xl mb-8 leading-relaxed">
            ⚠ Use fictional details only. Never enter a real client's name or financial information.
          </p>

          {/* Difficulty selector — applies to all modes */}
          <div className="card p-6 mb-6">
            <div className="text-[11px] uppercase tracking-[0.18em] text-[var(--ink)]/60 mb-3">Difficulty</div>
            <div className="grid grid-cols-3 gap-3">
              {[
                { value: "Easy", label: "Easy", desc: "Cooperative & helpful — volunteers info and gently guides the advisor along" },
                { value: "Medium", label: "Medium", desc: "Realistic — open but appropriately skeptical, raises a few real concerns" },
                { value: "Hard", label: "Hard", desc: "Demanding — grills you on process, fees, returns, fiduciary status, conflicts, and more" },
              ].map(opt => (
                <button
                  key={opt.value}
                  onClick={() => set("difficulty", opt.value)}
                  className={`p-4 rounded text-left transition-all ${
                    persona.difficulty === opt.value
                      ? "ink-bg"
                      : "border border-[var(--rule)] hover:border-[var(--ink)]"
                  }`}
                >
                  <div className={`font-display text-base mb-1 ${persona.difficulty === opt.value ? "text-[var(--parchment)]" : "text-[var(--ink)]"}`}>
                    {opt.label}
                  </div>
                  <div className={`text-[11px] leading-relaxed ${persona.difficulty === opt.value ? "text-[var(--parchment)]/70" : "text-[var(--ink)]/60"}`}>
                    {opt.desc}
                  </div>
                </button>
              ))}
            </div>
          </div>

          <div className="flex flex-wrap gap-3 mb-8">
            <button onClick={generate} disabled={generating} className="btn-primary px-5 py-2.5 rounded text-xs uppercase tracking-[0.18em]">
              {generating ? "Generating…" : "✨ Generate Prospect"}
            </button>
            <button onClick={() => setPersona({ ...EMPTY_PERSONA, difficulty: persona.difficulty })} className="btn-ghost px-5 py-2.5 rounded text-xs uppercase tracking-[0.18em]">Clear all</button>
          </div>

          {error && <div className="card-warm p-4 mb-6 text-sm text-[var(--accent)]">{error}</div>}

          <div className="card p-8">
            <div className="grid md:grid-cols-2 gap-x-8 gap-y-5">
              {fields.map(f => (
                <div key={f.key} className={f.multiline ? "md:col-span-2" : ""}>
                  <label className="block text-[11px] uppercase tracking-[0.18em] text-[var(--ink)]/60 mb-2">{f.label}</label>
                  {f.multiline ? (
                    <textarea
                      value={persona[f.key]}
                      onChange={e => set(f.key, e.target.value)}
                      placeholder={f.placeholder}
                      rows={2}
                      className="input-field w-full px-3 py-2.5 rounded text-sm"
                      style={{ resize: "vertical", minHeight: "60px" }}
                    />
                  ) : (
                    <input
                      type="text"
                      value={persona[f.key]}
                      onChange={e => set(f.key, e.target.value)}
                      placeholder={f.placeholder}
                      className="input-field w-full px-3 py-2.5 rounded text-sm"
                    />
                  )}
                </div>
              ))}
              <div className="md:col-span-2">
                <label className="block text-[11px] uppercase tracking-[0.18em] text-[var(--ink)]/60 mb-2">Additional context (optional)</label>
                <textarea
                  value={persona.notes}
                  onChange={e => set("notes", e.target.value)}
                  placeholder="e.g. Recently widowed. Daughter is pushing her to talk to advisors. Skeptical after a bad experience with another firm."
                  rows={6}
                  className="input-field w-full px-3 py-2.5 rounded text-sm"
                  style={{ resize: "vertical", minHeight: "120px" }}
                />
                <p className="text-[10px] text-[var(--ink)]/40 mt-1">Drag the bottom-right corner to make this box taller if needed.</p>
              </div>
            </div>
          </div>

          <div className="mt-8 flex justify-end gap-3">
            {mode === "curriculum" ? (
              <button onClick={() => setCurriculumPhase("pickStep")} className="btn-ghost px-6 py-3 rounded text-xs uppercase tracking-[0.18em]">← Pick Different Step</button>
            ) : (
              <button onClick={onCancel} className="btn-ghost px-6 py-3 rounded text-xs uppercase tracking-[0.18em]">Back</button>
            )}
            <button onClick={launch} className="btn-primary px-8 py-3 rounded text-xs uppercase tracking-[0.18em]">
              Begin Session →
            </button>
          </div>
        </div>
      );
    }

    // ======================================================================
    // LIVE SESSION VIEW (the heart of the app)
    // ======================================================================

    function SessionView({ apiKey, mode, persona, voice, speechRate, onComplete, onCancel }) {
      const [transcript, setTranscript] = useState([]); // { role: 'advisor'|'prospect', text, ts }
      const [interimText, setInterimText] = useState("");
      const [currentResponseText, setCurrentResponseText] = useState(""); // accumulated final-text for the in-progress turn
      const [isListening, setIsListening] = useState(false);
      const [isSpeaking, setIsSpeaking] = useState(false);
      const [isPaused, setIsPaused] = useState(false); // true when prospect's TTS is paused mid-utterance
      const [isThinking, setIsThinking] = useState(false);
      const [coachSuggestion, setCoachSuggestion] = useState("");
      const [coachLoading, setCoachLoading] = useState(false);
      const [error, setError] = useState("");
      const [sessionStartedAt] = useState(Date.now());
      const [elapsed, setElapsed] = useState(0);

      const recRef = useRef(null);
      const transcriptRef = useRef(transcript);
      const transcriptScrollRef = useRef(null);
      const finalSegmentsRef = useRef([]); // accumulating final segments before sending
      const committingRef = useRef(false); // double-commit guard — true while a turn is being committed
      const isSpeakingRef = useRef(false);
      const isListeningRef = useRef(false);
      const personaRef = useRef(persona);
      const apiKeyRef = useRef(apiKey);
      const modeRef = useRef(mode);
      const voiceRef = useRef(voice);
      const speechRateRef = useRef(speechRate);
      // Session memory — facts the prospect has revealed in this meeting. Used so the prospect
      // remembers things even after older turns are trimmed from the context window.
      // Capped at 25 entries to bound system-prompt token usage.
      const factsRef = useRef([]);
      // How many prospect turns have been committed. Used to throttle the fact-extraction call
      // (we extract every 3rd turn to control rate-limit pressure on the Groq free tier).
      const prospectTurnCountRef = useRef(0);
      // Latest in-flight fact-extraction promise — exposed for testing/debug only.
      const factExtractionInFlightRef = useRef(null);

      useEffect(() => { transcriptRef.current = transcript; }, [transcript]);
      useEffect(() => { isListeningRef.current = isListening; }, [isListening]);
      useEffect(() => { personaRef.current = persona; }, [persona]);
      useEffect(() => { apiKeyRef.current = apiKey; }, [apiKey]);
      useEffect(() => { modeRef.current = mode; }, [mode]);
      useEffect(() => { voiceRef.current = voice; }, [voice]);
      useEffect(() => { speechRateRef.current = speechRate; }, [speechRate]);

      // Elapsed time
      useEffect(() => {
        const t = setInterval(() => setElapsed(Math.floor((Date.now() - sessionStartedAt) / 1000)), 1000);
        return () => clearInterval(t);
      }, [sessionStartedAt]);

      // Auto-scroll transcript
      useEffect(() => {
        if (transcriptScrollRef.current) {
          transcriptScrollRef.current.scrollTop = transcriptScrollRef.current.scrollHeight;
        }
      }, [transcript, interimText]);

      // The handler functions live as stable references so we can attach/detach them
      // without rebuilding the recognition object. Keeping the recognition object alive
      // across turns is critical — recreating it forces a cold mic-session bootstrap on
      // every turn (200-500ms of perceived delay).

      const handleResult = useCallback((event) => {
        // Defensive: ignore any events that fire after we've started committing
        if (committingRef.current) return;
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const result = event.results[i];
          const txt = result[0].transcript;
          if (result.isFinal) {
            finalSegmentsRef.current.push(txt.trim());
            setCurrentResponseText(finalSegmentsRef.current.join(" "));
          } else {
            interim += txt;
          }
        }
        setInterimText(interim);
      }, []);

      const handleSttError = useCallback((e) => {
        if (e.error === "no-speech" || e.error === "aborted") return;
        if (e.error === "not-allowed") {
          setError("Microphone access denied. Allow mic permission in Chrome and reload.");
        } else {
          console.warn("STT error", e);
        }
      }, []);

      const handleSttEnd = useCallback(() => {
        // Auto-restart if we're still in listening mode, bot isn't speaking, and not committing
        if (isListeningRef.current && !isSpeakingRef.current && !committingRef.current && recRef.current) {
          try { recRef.current.start(); } catch {}
        }
      }, []);

      // Attach handlers — used when the mic is active or coming back online
      const attachRecognitionHandlers = useCallback(() => {
        const rec = recRef.current;
        if (!rec) return;
        rec.onresult = handleResult;
        rec.onerror = handleSttError;
        rec.onend = handleSttEnd;
      }, [handleResult, handleSttError, handleSttEnd]);

      // Detach handlers — used when committing. Late events fire into nulls and do nothing.
      // The recognition object itself stays alive so we don't pay the cold-start cost next turn.
      const detachRecognitionHandlers = useCallback(() => {
        const rec = recRef.current;
        if (!rec) return;
        try { rec.onresult = null; } catch {}
        try { rec.onerror = null; } catch {}
        try { rec.onend = null; } catch {}
      }, []);

      // Abort the recognition cleanly and detach all handlers.
      // Pairs with rearmRecognition() to bring the mic back online without a cold start.
      const abortRecognitionForCommit = useCallback(() => {
        const rec = recRef.current;
        if (!rec) return;
        // Detach FIRST so any pending onresult events go nowhere
        detachRecognitionHandlers();
        // abort() discards pending results — never use stop() here
        try { rec.abort(); } catch {}
      }, [detachRecognitionHandlers]);

      // Re-attach handlers and resume listening on the same warm recognition object.
      const rearmRecognition = useCallback(() => {
        if (!recRef.current) return;
        attachRecognitionHandlers();
        try { recRef.current.start(); } catch {}
      }, [attachRecognitionHandlers]);

      // ---------------- Set up speech recognition ----------------
      useEffect(() => {
        const rec = getSpeechRecognition();
        if (!rec) {
          setError("Your browser doesn't support speech recognition. Please use Chrome or Edge.");
          return;
        }
        recRef.current = rec;
        attachRecognitionHandlers();

        return () => {
          // On unmount only: detach + abort + null out
          detachRecognitionHandlers();
          try { rec.abort(); } catch {}
          recRef.current = null;
        };
      }, [attachRecognitionHandlers, detachRecognitionHandlers]);

      // Start/stop recognition based on isListening — uses the SAME warm object across turns
      useEffect(() => {
        if (!recRef.current) return;
        if (isListening && !isSpeaking) {
          // Make sure handlers are attached (they may have been detached during commit)
          attachRecognitionHandlers();
          try { recRef.current.start(); } catch {}
        } else {
          // Pause — but keep the object alive
          try { recRef.current.stop(); } catch {}
        }
      }, [isListening, isSpeaking, attachRecognitionHandlers]);

      // ---------------- Conversation loop ----------------

      const commitAdvisorTurn = useCallback(async () => {
        // GUARD: ignore if a commit is already in flight (prevents double-submission)
        if (committingRef.current) return;

        // Capture the text BEFORE we clear, so any stale state can't sneak in
        const segments = finalSegmentsRef.current;
        const fullText = (segments.join(" ") + " " + (interimText || "")).trim();

        if (!fullText) {
          // Nothing to send — clear the buffers and bail
          finalSegmentsRef.current = [];
          setInterimText("");
          setCurrentResponseText("");
          return;
        }

        // Set the guard FIRST so any late onresult events from the recognizer get ignored
        committingRef.current = true;

        // INSTANT FEEDBACK: show "Prospect thinking…" immediately, before any other work.
        // This is what makes the UI feel snappy even though the network call hasn't started.
        setIsThinking(true);

        // Clear all buffers immediately
        finalSegmentsRef.current = [];
        setInterimText("");
        setCurrentResponseText("");

        // Abort recognition cleanly — detaches handlers + abort() discards pending results.
        // The recognition OBJECT stays alive so we don't pay a cold mic-bootstrap cost
        // when the mic re-arms after the prospect speaks.
        setIsListening(false);
        abortRecognitionForCommit();

        const newTurn = { role: "advisor", text: fullText, ts: Date.now() };
        const updatedTranscript = [...transcriptRef.current, newTurn];
        setTranscript(updatedTranscript);

        try {
          await getProspectReply(updatedTranscript);
        } finally {
          // Release the guard once the prospect has fully responded
          committingRef.current = false;
        }
      }, [interimText, abortRecognitionForCommit]);

      // Clear the in-progress response without submitting
      const clearCurrentResponse = () => {
        finalSegmentsRef.current = [];
        setCurrentResponseText("");
        setInterimText("");
      };

      // Fact extraction: run a small Groq call to pull persona-relevant facts the prospect
      // just stated. Result is appended to factsRef.current and persists through the rest
      // of the meeting, surviving transcript trimming.
      //
      // This runs in parallel with TTS playback so it does NOT delay the user's perception.
      // Failures are silent — extraction is a nice-to-have, not critical.
      const scheduleFactExtraction = (prospectTurnText, currentTranscript) => {
        // Build a small recent-context window for the extraction call (last 4 turns).
        // This helps the model understand what was just discussed without the full transcript.
        const recentForContext = currentTranscript
          .slice(-5, -1) // last 4 turns BEFORE the prospect's latest, since prospectTurnText is the latest
          .map(t => `${t.role === "advisor" ? "ADVISOR" : "PROSPECT"}: ${t.text}`)
          .join("\n");

        const promise = (async () => {
          try {
            const reply = await callGroq({
              apiKey: apiKeyRef.current,
              model: MODEL_PROSPECT, // use the cheaper/faster prospect model for extraction
              messages: [
                { role: "system", content: "You extract factual statements from role-play dialogue. Always return valid JSON." },
                { role: "user", content: buildFactExtractionPrompt(prospectTurnText, recentForContext) },
              ],
              temperature: 0.1,
              jsonMode: true,
            });

            // Defensive parse — if the model returns malformed JSON, swallow and move on
            let parsed;
            try {
              parsed = JSON.parse(reply);
            } catch {
              return;
            }

            const newFacts = Array.isArray(parsed?.facts) ? parsed.facts : [];
            if (newFacts.length === 0) return;

            // Filter: keep only string facts, trim them, drop empties and duplicates
            const cleaned = newFacts
              .filter(f => typeof f === "string")
              .map(f => f.trim())
              .filter(f => f.length > 0 && f.length < 200);

            if (cleaned.length === 0) return;

            // Merge into the running list, deduplicating against existing facts (case-insensitive)
            const existingLower = new Set(factsRef.current.map(f => f.toLowerCase()));
            for (const fact of cleaned) {
              if (!existingLower.has(fact.toLowerCase())) {
                factsRef.current.push(fact);
                existingLower.add(fact.toLowerCase());
              }
            }

            // Cap at 25 entries — drop oldest 5 if exceeded to bound system-prompt size
            if (factsRef.current.length > 25) {
              factsRef.current = factsRef.current.slice(factsRef.current.length - 25);
            }
          } catch (e) {
            // Silent — extraction is a soft enhancement; never break the conversation
            console.debug("Fact extraction failed (non-critical):", e?.message || e);
          }
        })();

        factExtractionInFlightRef.current = promise;
        return promise;
      };

      const getProspectReply = async (currentTranscript, isRetry = false) => {
        setIsThinking(true);
        try {
          // Build the system prompt with persistent session memory injected.
          // The base persona stays in the prompt; running facts list is appended
          // so the prospect remembers things even if older turns are trimmed.
          const baseSystemPrompt = buildProspectSystemPromptWithMemory(personaRef.current, factsRef.current);
          const retryNote = isRetry
            ? "\n\nIMPORTANT: The advisor has chosen to retry their last response. Generate a meaningfully different reaction this time — maybe more skeptical, maybe pulling on a different thread of the conversation, maybe revealing a different concern. Don't repeat what you said before. Same character, fresh response."
            : "";

          // Trim the transcript to bound token usage on long sessions.
          // Below 12 turns: send everything. Above: first 2 + last 10.
          // The session memory (factsRef) carries the trimmed-out facts forward.
          const trimmedTranscript = trimTranscriptForContext(currentTranscript, 12);

          const messages = [
            { role: "system", content: baseSystemPrompt + retryNote },
            ...trimmedTranscript.map(t => ({
              role: t.role === "advisor" ? "user" : "assistant",
              content: t.text,
            })),
          ];

          const reply = await callGroq({
            apiKey: apiKeyRef.current,
            model: MODEL_PROSPECT,
            messages,
            temperature: isRetry ? 1.0 : 0.85,
          });

          const cleaned = stripStageDirections(reply);
          const newTurn = { role: "prospect", text: cleaned, ts: Date.now() };
          const updated = [...currentTranscript, newTurn];
          setTranscript(updated);
          setIsThinking(false);

          // Track prospect turn count for the fact-extraction throttle.
          // Don't increment on retries (we're regenerating, not adding a new turn).
          if (!isRetry) {
            prospectTurnCountRef.current += 1;
          }

          // Speak the reply
          isSpeakingRef.current = true;
          setIsSpeaking(true);
          // Note: recognition was already aborted in commitAdvisorTurn — no need to stop again

          // In practice mode, fetch coach suggestion in parallel
          if (modeRef.current === "practice") {
            getCoachSuggestion(updated);
          }

          // FACT EXTRACTION (runs in parallel with TTS playback, no perceived latency)
          // Throttled to every 3rd turn to control rate-limit pressure.
          // Only runs on real (non-retry) turns. Fire-and-forget — failures are silent.
          if (!isRetry && prospectTurnCountRef.current > 0 && prospectTurnCountRef.current % 3 === 0) {
            scheduleFactExtraction(cleaned, updated);
          }

          await speak({
            text: cleaned,
            voice: getBestVoice(voiceRef.current),
            rate: speechRateRef.current,
            onEnd: () => {
              isSpeakingRef.current = false;
              setIsSpeaking(false);
              setIsPaused(false); // Reset pause state — fresh start for next turn
              // DEFENSIVE: clear any leftover advisor buffers before the mic re-arms for the next turn.
              // Belt-and-suspenders against stale segments from the previous turn leaking through.
              finalSegmentsRef.current = [];
              setInterimText("");
              setCurrentResponseText("");
            },
          });
        } catch (e) {
          setError("Couldn't reach the AI prospect: " + e.message);
          setIsThinking(false);
        }
      };

      // Retry: rewind transcript to BEFORE this prospect turn, regenerate
      const handleTryAgain = async (prospectTurnIndex) => {
        if (isThinking || isSpeaking) return;
        // Stop any ongoing TTS or listening
        stopSpeaking();
        isSpeakingRef.current = false;
        setIsSpeaking(false);
        abortRecognitionForCommit();

        // Rewind transcript: keep everything up to (but not including) this prospect turn
        // The advisor's turn right before it stays in the transcript — we just regenerate the prospect's response
        const rewound = transcriptRef.current.slice(0, prospectTurnIndex);
        setTranscript(rewound);
        setCoachSuggestion("");
        // Re-request the prospect's response with retry flag
        await getProspectReply(rewound, true);
      };

      // Advisor retry: rewind transcript to BEFORE this advisor turn so the advisor can speak again.
      // Removes the advisor turn AND any prospect response that came after it.
      const handleAdvisorTryAgain = async (advisorTurnIndex) => {
        if (isThinking || isSpeaking) return;
        // Stop any ongoing TTS or listening
        stopSpeaking();
        isSpeakingRef.current = false;
        setIsSpeaking(false);
        setIsListening(false);
        // Abort & dispose so no stale results leak into the retry attempt
        abortRecognitionForCommit();
        // Clear any in-progress speech segments
        finalSegmentsRef.current = [];
        setInterimText("");
        setCurrentResponseText("");

        // Rewind: keep everything up to (but not including) this advisor turn
        const rewound = transcriptRef.current.slice(0, advisorTurnIndex);
        setTranscript(rewound);
        setCoachSuggestion("");
        // Don't auto-trigger anything — just let the advisor click the mic and try again
      };

      const getCoachSuggestion = async (currentTranscript) => {
        setCoachLoading(true);
        try {
          const lastProspect = [...currentTranscript].reverse().find(t => t.role === "prospect")?.text || "";
          const recent = currentTranscript.slice(-8).map(t => `${t.role === "advisor" ? "ADVISOR" : "PROSPECT"}: ${t.text}`).join("\n");
          const reply = await callGroq({
            apiKey: apiKeyRef.current,
            model: MODEL_COACH,
            messages: [
              { role: "system", content: buildCoachSystemPrompt() },
              { role: "user", content: `RECENT EXCHANGE:\n${recent}\n\nThe prospect just said: "${lastProspect}"\n\nWhat should the advisor say next? Give the actual words the advisor should say. 2–3 sentences max.` }
            ],
            temperature: 0.6,
          });
          setCoachSuggestion(reply.replace(/\*+/g, "").trim());
        } catch (e) {
          console.warn("Coach error", e);
        } finally {
          setCoachLoading(false);
        }
      };

      // Toggle mic
      const toggleMic = () => {
        if (isSpeaking) { stopSpeaking(); isSpeakingRef.current = false; setIsSpeaking(false); setIsPaused(false); }
        setIsListening(l => !l);
      };

      // Pause / resume the prospect's currently-playing audio without canceling it.
      // Different from stopSpeaking() — paused audio resumes at the same point.
      const togglePauseAudio = () => {
        if (!isSpeaking) return;
        if (isPaused) {
          resumeSpeaking();
          setIsPaused(false);
        } else {
          pauseSpeaking();
          setIsPaused(true);
        }
      };

      const handleEnd = async () => {
        // Flush any pending response the advisor was in the middle of
        if (finalSegmentsRef.current.length > 0 || (interimText && interimText.trim())) {
          await commitAdvisorTurn();
        }
        stopSpeaking();
        abortRecognitionForCommit();
        setIsListening(false);
        onComplete(transcriptRef.current);
      };

      const formatTime = (s) => {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return `${m}:${sec.toString().padStart(2, "0")}`;
      };

      // Status text
      let statusText = "Tap the mic to start speaking";
      let statusColor = "var(--ink)";
      if (isListening) { statusText = isSpeaking ? "Prospect is speaking…" : "Listening… speak now"; statusColor = "var(--accent)"; }
      if (isThinking) { statusText = "Prospect is thinking…"; statusColor = "var(--gold)"; }
      if (isSpeaking) { statusText = "Prospect is speaking…"; statusColor = "var(--gold)"; }

      return (
        <div className="min-h-screen flex flex-col">
          {/* Top bar */}
          <div className="border-b ink-bg px-8 py-4 flex items-center justify-between">
            <div className="flex items-center gap-6">
              <Logo />
              <div className="h-8 w-px bg-white/20"></div>
              <div>
                <div className="text-[10px] uppercase tracking-[0.25em] text-white/70">
                  {mode === "pitch" && "Live pitch"}
                  {mode === "practice" && "Guided practice"}
                  {mode === "curriculum" && "Curriculum drill"}
                </div>
                <div className="text-sm text-white">
                  with {persona.name || "your prospect"}
                  {persona.difficulty && (
                    <span className="ml-2 text-[10px] uppercase tracking-[0.2em] text-white/70">· {persona.difficulty}</span>
                  )}
                </div>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className="text-sm font-mono text-white/70">{formatTime(elapsed)}</div>
              <button onClick={onCancel} className="text-xs uppercase tracking-[0.18em] text-white/60 hover:text-white">Discard</button>
              <button onClick={handleEnd} className="px-5 py-2.5 rounded text-xs uppercase tracking-[0.18em] bg-white text-[var(--teal)] hover:bg-white/90 transition-all font-medium">
                End & Get Report Card
              </button>
            </div>
          </div>

          {/* Curriculum scenario brief */}
          {mode === "curriculum" && persona.focusStep && CURRICULUM_STEPS[persona.focusStep] && (
            <div className="card-warm px-8 py-4 border-b" style={{ borderColor: "var(--rule)", borderRadius: 0 }}>

                  <strong>Scenario:</strong> {CURRICULUM_STEPS[persona.focusStep].scenario}

              </div>
            </div>
          )}

          {error && (
            <div className="bg-[var(--accent)] text-white px-8 py-3 text-sm">{error}</div>

          <div className="flex-1 max-w-6xl w-full mx-auto px-8 py-8 grid lg:grid-cols-3 gap-8">
            {/* Transcript */}
            <div className={mode === "practice" ? "lg:col-span-2" : "lg:col-span-3"}>

                  <div className="h-full flex items-center justify-center text-center text-[var(--ink)]/50">
                    <div>
                      <div className="font-display text-xl mb-2">Ready when you are.</div>
                      <p className="text-sm max-w-xs mx-auto">Tap the microphone below and open the meeting. The prospect is waiting for you.</p>
                    </div>
                  </div>
                )}
                <div className="space-y-5">
                  {transcript.map((t, i) => {
                    const isLatestProspect = t.role === "prospect" && i === transcript.length - 1;
                    const showProspectRetry = mode === "practice" && t.role === "prospect" && isLatestProspect && !isThinking && !isSpeaking;

                    // Advisor try-again: only for the *latest* advisor turn that has been responded to
                    // (i.e. it's followed by a prospect turn that is the last turn)
                    const isLatestAdvisorWithReply =
                      t.role === "advisor" &&
                      i === transcript.length - 2 &&
                      transcript[i + 1]?.role === "prospect";
                    const showAdvisorRetry = mode === "practice" && isLatestAdvisorWithReply && !isThinking && !isSpeaking;

                    return (
                      <div key={i} className={`fade-up ${t.role === "advisor" ? "" : "pl-8"}`}>
                        <div className="flex items-center justify-between gap-3 mb-1">
                          <div className={`text-[10px] uppercase tracking-[0.2em] ${t.role === "advisor" ? "text-[var(--ink)]/60" : "text-[var(--gold)]"}`}>
                            {t.role === "advisor" ? "You" : (persona.name || "Prospect")}
                          </div>
                          {showProspectRetry && (
                            <button
                              onClick={() => handleTryAgain(i)}
                              className="text-[10px] uppercase tracking-[0.18em] text-[var(--ink)]/40 hover:text-[var(--gold)] flex items-center gap-1"
                              title="Have the prospect react differently to your same response"
                            >
                              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                                <path d="M3 3v5h5"></path>
                              </svg>
                              New Reaction
                            </button>
                          )}
                          {showAdvisorRetry && (
                            <button
                              onClick={() => handleAdvisorTryAgain(i)}
                              className="text-[10px] uppercase tracking-[0.18em] text-[var(--ink)]/40 hover:text-[var(--accent)] flex items-center gap-1"
                              title="Re-do your response — this turn and the prospect's reply will be removed"
                            >
                              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                                <path d="M3 3v5h5"></path>
                              </svg>
                              Re-do my response
                            </button>
                          )}
                        </div>
                        <div className={`text-sm leading-relaxed ${t.role === "advisor" ? "text-[var(--ink)]" : "text-[var(--ink)]/80 italic"}`}>
                          {t.text}
                        </div>
                      </div>
                    );
                  })}
                  {/* Live in-progress response — accumulates as advisor speaks */}
                  {(currentResponseText || interimText) && (
                    <div className="card p-4 border-2" style={{ borderColor: "var(--gold)" }}>
                      <div className="text-[10px] uppercase tracking-[0.2em] mb-1.5 text-[var(--gold)]">You (in progress)</div>
                      <div className="text-sm leading-relaxed">
                        <span className="text-[var(--ink)]">{currentResponseText}</span>
                        {interimText && (
                          <span className="text-[var(--ink)]/40 italic">{currentResponseText ? " " : ""}{interimText}</span>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* Mic controls */}
              <div className="mt-8 flex flex-col items-center">
                <div className="text-xs uppercase tracking-[0.2em] mb-4" style={{ color: statusColor }}>{statusText}</div>
                <button
                  onClick={toggleMic}
                  disabled={isThinking || isSpeaking}
                  className={`w-20 h-20 rounded-full flex items-center justify-center relative transition-all ${
                    isListening ? "bg-[var(--accent)] text-white pulse-ring" : "btn-primary"
                  }`}
                  style={{ opacity: (isThinking || isSpeaking) ? 0.5 : 1 }}
                >
                  {isSpeaking ? (
                    <div className="flex items-end gap-1 h-8">
                      {[0,1,2,3,4].map(i => (
                        <div key={i} className="wave-bar w-1 h-full bg-current rounded-full" style={{ transformOrigin: "bottom" }}></div>
                      ))}
                    </div>
                  ) : (
                    <svg viewBox="0 0 24 24" fill="currentColor" className="w-8 h-8">
                      <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3z"/>
                      <path d="M19 11a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.93V21h-2a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-3.07A7 7 0 0 0 19 11z"/>
                    </svg>
                  )}
                </button>

                {/* Pause/Resume audio button — only visible while prospect is speaking */}
                {isSpeaking && (
                  <button
                    onClick={togglePauseAudio}
                    className="mt-4 px-5 py-2 rounded-full text-xs uppercase tracking-[0.18em] border transition-colors"
                    style={{
                      borderColor: "var(--rule)",
                      background: isPaused ? "var(--gold)" : "transparent",
                      color: isPaused ? "white" : "var(--ink)",
                    }}
                    aria-label={isPaused ? "Resume audio" : "Pause audio"}

                    {isPaused ? (
                      <span className="flex items-center gap-2">
                        <svg viewBox="0 0 24 24" fill="currentColor" className="w-3 h-3"><path d="M8 5v14l11-7z"/></svg>

                    ) : (
                      <span className="flex items-center gap-2">
                        <svg viewBox="0 0 24 24" fill="currentColor" className="w-3 h-3"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
                        Pause Audio
                      </span>
                    )}

                )}

                <div className="text-[11px] text-[var(--ink)]/50 mt-3 text-center max-w-sm">
                  {isPaused
                    ? "Audio paused — click Resume to continue"
                    : isSpeaking
                      ? "Prospect speaking…"
                      : isThinking
                        ? "Prospect thinking…"
                        : isListening
                          ? "Take your time — mic stays on until you hit Submit"
                          : "Click to start speaking"}
                </div>

                {/* Submit + Clear buttons — only visible when there's something to submit */}
                {(currentResponseText || interimText) && !isThinking && !isSpeaking && (
                  <div className="mt-6 flex flex-col items-center gap-2 fade-up">
                    <button
                      onClick={commitAdvisorTurn}
                      className="btn-gold px-10 py-4 rounded text-xs uppercase tracking-[0.2em]"

                      Submit Response →
                    </button>
                    {currentResponseText && (
                      <button
                        onClick={clearCurrentResponse}
                        className="text-[10px] uppercase tracking-[0.18em] text-[var(--ink)]/40 hover:text-[var(--accent)] mt-1"
                      >
                        ↻ Clear & restart this response
                      </button>
                    )}
                  </div>
                )}
              </div>
            </div>

            {/* Coach panel (practice mode only) */}
            {mode === "practice" && (
              <div className="lg:col-span-1">
                <div className="card-warm p-6 sticky top-8">
                  <div className="flex items-center justify-between mb-3">
                    <div className="text-[10px] uppercase tracking-[0.25em] text-[var(--gold)] font-medium">Coach Suggestion</div>
                    {coachLoading && <span className="text-[10px] text-[var(--ink)]/40">thinking…</span>}
                  </div>
                  <div className="h-px mb-4" style={{ background: "var(--gold)" }}></div>
                  {coachSuggestion ? (
                    <div className="text-sm text-[var(--ink)] leading-relaxed italic">"{coachSuggestion}"</div>
                  ) : (
                    <div className="text-xs text-[var(--ink)]/50 italic">
                      After each prospect turn, a senior coach will suggest what an expert advisor might say next. Use it as inspiration — or ignore it and find your own way.
                    </div>
                  )}
                  <div className="mt-6 pt-4 border-t border-[var(--gold)]/20">
                    <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--ink)]/50 mb-2">Practice tips</div>
                    <p className="text-[11px] text-[var(--ink)]/70 leading-relaxed mb-2">
                      <span className="font-medium text-[var(--gold)]">New Reaction</span> — keeps your response, but the prospect reacts differently.
                    </p>
                    <p className="text-[11px] text-[var(--ink)]/70 leading-relaxed">
                      <span className="font-medium text-[var(--accent)]">Re-do my response</span> — erase your last turn and try again with a different approach.
                    </p>
                  </div>
                  <div className="mt-6 pt-4 border-t border-[var(--gold)]/20">
                    <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--ink)]/50 mb-3">7-step framework</div>
                    <ol className="text-[11px] space-y-1.5 text-[var(--ink)]/70">
                      <li>1. Meeting Introduction</li>
                      <li>2. Profiling the Prospect</li>
                      <li>3. Uncovering Problems</li>
                      <li>4. Reviewing Implications</li>
                      <li>5. Providing Solutions</li>
                      <li>6. Call to Action</li>
                      <li>7. Meeting Wrap-Up</li>
                    </ol>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ======================================================================

    const RUBRIC_LABELS = {
      meeting_introduction: "Meeting Introduction",
      profiling: "Profiling the Prospect",
      uncovering_problems: "Uncovering Key Problems / Concerns",
      reviewing_implications: "Reviewing Implications",
      providing_solutions: "Providing Clear Solutions",
      call_to_action: "Call to Action & Next Steps",
      wrap_up: "Meeting Wrap-Up",
    };

    const QUAL_LABELS = {
      cadence: "Cadence",
      conversational_flow: "Conversational Flow",
      format: "Format",
      knowledge: "Knowledge Demonstrated",
      referencing_concerns: "Referencing Client Concerns",
      rapport: "Building Rapport",
      confidence: "Confidence",
      delivery: "Delivery",
    };

    function ScoreBar({ score }) {
      const pct = (score / 10) * 100;
      const color = score >= 8 ? "var(--gold)" : score >= 6 ? "var(--ink)" : "var(--accent)";
      return (
        <div className="flex items-center gap-3">
          <div className="flex-1 h-1.5 rounded-full" style={{ background: "var(--rule)" }}>
            <div className="h-full rounded-full score-bar-fill" style={{ width: `${pct}%`, background: color }}></div>
          </div>
          <div className="font-display text-2xl tabular-nums w-8 text-right" style={{ color }}>{score}</div>
        </div>
      );
    }

    // Helper: build a plain-text version of a report for emailing
    function buildReportEmailBody(report, user) {
      const card = report.card;
      const persona = report.persona || {};
      const va = report.voiceAnalytics;
      const date = new Date(report.createdAt).toLocaleDateString(undefined, { month: "long", day: "numeric", year: "numeric" });
      const overall = card?.scores ? (() => {
        const all = Object.values(card.scores).map(s => s.score).filter(Boolean);
        return all.length ? (all.reduce((a, b) => a + b, 0) / all.length).toFixed(1) : "—";
      })() : "—";

      const lines = [];
      lines.push("CORBETT ROAD · PITCH STUDIO REPORT CARD");
      lines.push("=".repeat(50));
      lines.push("");
      lines.push(`Advisor:    ${user?.name || user?.email || "Unknown"}`);
      lines.push(`Email:      ${user?.email || ""}`);
      lines.push(`Date:       ${date}`);
      lines.push(`Mode:       ${report.mode || "pitch"}`);
      if (persona.difficulty) lines.push(`Difficulty: ${persona.difficulty}`);
      if (persona.focusStep && CURRICULUM_STEPS[persona.focusStep]) {
        lines.push(`Focus:      ${CURRICULUM_STEPS[persona.focusStep].label}`);
      }
      lines.push(`Prospect:   ${persona.name || "Anonymous"}${persona.age ? `, age ${persona.age}` : ""}`);
      lines.push("");
      lines.push(`OVERALL SCORE: ${overall} / 10`);
      lines.push("");

      if (card?.scores) {
        lines.push("7-STEP RUBRIC:");
        Object.entries(RUBRIC_LABELS).forEach(([key, label], i) => {
          const item = card.scores[key];
          if (!item) return;
          lines.push(`  ${i + 1}. ${label}: ${item.score}/10`);
          if (item.evidence) lines.push(`     Evidence: ${item.evidence}`);
        });
        lines.push("");
      }

      if (card?.summary) {
        lines.push("SUMMARY:");
        lines.push(`  ${card.summary}`);
        lines.push("");
      }

      if (card?.top_strengths?.length) {
        lines.push("TOP STRENGTHS:");
        card.top_strengths.forEach(s => lines.push(`  • ${s}`));
        lines.push("");
      }

      if (card?.top_growth_areas?.length) {
        lines.push("GROWTH AREAS:");
        card.top_growth_areas.forEach(s => lines.push(`  • ${s}`));
        lines.push("");
      }

      if (va) {
        lines.push("VOICE ANALYTICS:");
        lines.push(`  Talk ratio:        ${(va.talkRatio * 100).toFixed(0)}% advisor / ${(100 - va.talkRatio * 100).toFixed(0)}% prospect`);
        lines.push(`  Total words:       ${va.totalAdvisorWords} (advisor) / ${va.totalProspectWords} (prospect)`);
        lines.push(`  Avg turn length:   ${va.averageTurnWords} words`);
        lines.push(`  Filler words:      ${va.fillerCount} (${va.fillerPercentage.toFixed(1)}%)`);
        if (va.topFillers.length) {
          lines.push(`  Top fillers:       ${va.topFillers.map(([w, c]) => `"${w}" (${c}x)`).join(", ")}`);
        }
        lines.push(`  Session duration:  ${va.sessionDurationMin.toFixed(1)} minutes`);
        lines.push("");
      }

      lines.push("");
      lines.push("Generated by Corbett Road Pitch Studio");
      return lines.join("\n");
    }

    // ======================================================================
    // DISCUSSION DIALOG — chat with AI coach about the session
    // ======================================================================

    function DiscussionDialog({ report, apiKey, onClose }) {
      const [messages, setMessages] = useState([]); // {role: 'user'|'assistant', content: string}
      const [input, setInput] = useState("");
      const [busy, setBusy] = useState(false);
      const scrollRef = useRef(null);
      const inputRef = useRef(null);

      const suggestedPrompts = [
        "What's the single most important thing for me to work on?",
        "Where did I lose the prospect's interest, and how could I have kept it?",
        "Show me 3 alternative ways I could have opened this meeting.",
        "How could I have handled the fee question better?",
        "What did I do well that I should keep doing?",
      ];

      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [messages, busy]);

      useEffect(() => {
        if (inputRef.current) inputRef.current.focus();
      }, []);

      const send = async (text) => {
        const trimmed = (text || input).trim();
        if (!trimmed || busy) return;
        setInput("");
        const userMsg = { role: "user", content: trimmed };
        const newMessages = [...messages, userMsg];
        setMessages(newMessages);
        setBusy(true);
        try {
          const reply = await callGroq({
            apiKey,
            model: MODEL_GRADER,
            messages: [
              { role: "system", content: buildDiscussionSystemPrompt(report) },
              ...newMessages,
            ],
            temperature: 0.5,
          });
          const cleaned = reply.replace(/\*\*/g, "").trim();
          setMessages([...newMessages, { role: "assistant", content: cleaned }]);
        } catch (e) {
          setMessages([...newMessages, { role: "assistant", content: `Sorry — couldn't reach the coach. ${e.message}` }]);
        } finally {
          setBusy(false);
        }
      };

      const handleKey = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      };

      return (
        <div className="fixed inset-0 z-50 flex items-stretch md:items-center justify-center md:p-6" style={{ background: "rgba(11, 24, 40, 0.7)", backdropFilter: "blur(4px)" }} onClick={onClose}>
          <div className="card w-full max-w-3xl flex flex-col fade-up" style={{ height: "min(90vh, 760px)" }} onClick={e => e.stopPropagation()}>
            {/* Header */}
            <div className="flex items-center justify-between p-6 border-b" style={{ borderColor: "var(--rule)" }}>
              <div>
                <div className="text-[10px] uppercase tracking-[0.25em] text-[var(--gold)] mb-1">Coach Discussion</div>
                <h2 className="font-display text-2xl">Talk it through</h2>
              </div>
              <button onClick={onClose} className="text-[var(--ink)]/40 hover:text-[var(--ink)] text-2xl leading-none">×</button>
            </div>

            {/* Messages */}
            <div ref={scrollRef} className="flex-1 overflow-y-auto p-6 space-y-5">
              {messages.length === 0 && (
                <div className="space-y-5">
                  <p className="text-sm text-[var(--ink)]/70 leading-relaxed">
                    Ask the coach anything about this session. They have the full transcript, report card, and voice analytics in front of them. Try one of these to start, or type your own question:
                  </p>
                  <div className="space-y-2">
                    {suggestedPrompts.map((p, i) => (
                      <button
                        key={i}
                        onClick={() => send(p)}
                        className="block w-full text-left p-3 rounded text-sm card-warm hover:bg-[var(--parchment-dim)] transition-colors"
                      >
                        {p}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {messages.map((m, i) => (
                <div key={i} className={`flex ${m.role === "user" ? "justify-end" : "justify-start"} fade-up`}>
                  <div className={`max-w-[85%] px-4 py-3 rounded-lg text-sm leading-relaxed ${
                    m.role === "user" ? "ink-bg rounded-br-none" : "card-warm rounded-bl-none"
                  }`}>
                    {m.role === "assistant" && (
                      <div className="text-[10px] uppercase tracking-[0.2em] mb-1.5 text-[var(--gold)]">Coach</div>
                    )}
                    <div className="whitespace-pre-wrap">{m.content}</div>
                  </div>
                </div>
              ))}

              {busy && (
                <div className="flex justify-start fade-up">
                  <div className="card-warm rounded-bl-none px-4 py-3 text-sm">
                    <div className="text-[10px] uppercase tracking-[0.2em] mb-1.5 text-[var(--gold)]">Coach</div>
                    <div className="flex items-center gap-1.5">
                      {[0,1,2].map(i => (
                        <div key={i} className="w-1.5 h-1.5 rounded-full bg-[var(--ink)]/40" style={{ animation: `pulse 1.4s ease-in-out ${i * 0.2}s infinite` }}></div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* Input */}
            <div className="p-4 border-t" style={{ borderColor: "var(--rule)" }}>
              <div className="flex gap-3">
                <textarea
                  ref={inputRef}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={handleKey}
                  placeholder="Ask anything about this session..."
                  rows={1}
                  className="input-field flex-1 px-4 py-3 rounded text-sm resize-none"
                  style={{ minHeight: "44px", maxHeight: "120px" }}
                  disabled={busy}
                />
                <button
                  onClick={() => send()}
                  disabled={!input.trim() || busy}
                  className="btn-primary px-5 rounded text-xs uppercase tracking-[0.18em]"
                >
                  Send
                </button>
              </div>
              <div className="text-[10px] text-[var(--ink)]/40 mt-2">Press Enter to send · Shift+Enter for new line</div>
            </div>
          </div>
        </div>
      );
    }

    function ReportCardView({ report, onBack, user, allReports, apiKey, onDelete }) {
      const card = report.card;
      const persona = report.persona;
      const [discussOpen, setDiscussOpen] = useState(false);

      // All hooks first — must run on every render regardless of branch.
      // The "raw" overall = simple average of all rubric category scores.
      const overall = useMemo(() => {
        if (!card) return 0;
        const all = Object.values(card.scores || {}).map(s => s.score).filter(Boolean);
        if (!all.length) return 0;
        return all.reduce((a,b) => a+b, 0) / all.length;
      }, [card]);

      // Difficulty + adjusted score for display
      const difficulty = persona?.difficulty || "Medium";
      const multiplier = DIFFICULTY_MULTIPLIERS[difficulty] ?? 1.0;
      const adjustedOverall = overall * multiplier;

      if (!card) return null;

      const isDrill = card.isObjectionsDrill || report.mode === "spin";

      const handleDelete = async () => {
        const confirmed = window.confirm(isDrill
          ? "Delete this drill session permanently? This cannot be undone."
          : "Delete this report card permanently? This cannot be undone.");
        if (!confirmed) return;
        try {
          await onDelete(report.id);
          onBack();
        } catch (e) {
          alert("Couldn't delete: " + e.message);
        }
      };

      // ===== Drill report — distinct layout, no rubric =====
      if (isDrill) {
        const drills = card.spinDrills || [];
        const date = new Date(report.createdAt).toLocaleDateString(undefined, {
          weekday: "long", month: "long", day: "numeric", year: "numeric"
        });
        const avg = card.drillAvgScore ?? (drills.length > 0 ? drills.reduce((s, d) => s + d.score, 0) / drills.length : 0);

        return (
          <div className="max-w-4xl mx-auto px-8 py-12 fade-up">
            <button onClick={onBack} className="text-xs uppercase tracking-[0.18em] text-[var(--ink)]/60 hover:text-[var(--ink)] mb-6">← Back</button>

            {/* Header */}
            <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-6 mb-10">
              <div>
                <div className="text-xs uppercase tracking-[0.25em] text-[var(--gold)] mb-2">Objections Drill · {persona?.difficulty || "Medium"}</div>
                <h1 className="font-display text-5xl mb-2 leading-tight">Drill Session</h1>
                <div className="text-sm text-[var(--ink)]/60">{date}</div>
              </div>
              <div className="text-right">
                <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--ink)]/50">Drill avg</div>
                <div className="font-display text-6xl leading-none tabular-nums" style={{ color: "var(--gold)" }}>{avg.toFixed(1)}</div>
                <div className="text-[10px] text-[var(--ink)]/50 mt-1">{drills.length} {drills.length === 1 ? "objection" : "objections"}</div>
              </div>
            </div>

            {/* Practice notice */}
            <div className="card-warm p-4 mb-8 flex items-start gap-3">

    // Simple SVG line chart for showing score progression over time
    function ProgressionChart({ reports, currentReportId }) {
      const data = useMemo(() => {
        const sorted = [...reports].sort((a, b) => a.createdAt - b.createdAt);
        return sorted
          .map(r => {
            // Use difficulty-ADJUSTED score for progression chart consistency
            const overall = getAdjustedScore(r);
            if (overall === null) return null;
            return { id: r.id, score: overall, isCurrent: r.id === currentReportId, date: new Date(r.createdAt) };
          })
          .filter(Boolean);
      }, [reports, currentReportId]);

      if (data.length < 2) {
        return <div className="text-center text-sm text-[var(--ink)]/50 py-8">Complete more sessions to see your progression.</div>;
      }

      const width = 700;
      const height = 220;
      const padding = { top: 20, right: 20, bottom: 35, left: 40 };
      const chartW = width - padding.left - padding.right;
      const chartH = height - padding.top - padding.bottom;

      const xPos = i => padding.left + (data.length === 1 ? chartW / 2 : (i / (data.length - 1)) * chartW);
      const yPos = score => padding.top + chartH - (score / 10) * chartH;

      const linePoints = data.map((d, i) => `${xPos(i)},${yPos(d.score)}`).join(" ");

      // Compute simple trend (first half avg vs second half avg)
      const half = Math.floor(data.length / 2);
      const firstHalfAvg = data.slice(0, half).reduce((s, d) => s + d.score, 0) / half;
      const secondHalfAvg = data.slice(half).reduce((s, d) => s + d.score, 0) / (data.length - half);
      const trend = secondHalfAvg - firstHalfAvg;

      return (
        <div>
          <svg viewBox={`0 0 ${width} ${height}`} className="w-full" style={{ maxHeight: "300px" }}>
            {/* Gridlines + y-axis labels */}
            {[2, 4, 6, 8, 10].map(n => (
              <g key={n}>
                <line x1={padding.left} y1={yPos(n)} x2={padding.left + chartW} y2={yPos(n)} stroke="rgba(11,24,40,0.06)" strokeWidth="1" />
                <text x={padding.left - 8} y={yPos(n) + 4} fontSize="10" fill="rgba(11,24,40,0.4)" textAnchor="end">{n}</text>
              </g>
            ))}
            {/* Line */}
            <polyline points={linePoints} fill="none" stroke="var(--gold)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
            {/* Points */}
            {data.map((d, i) => (
              <g key={d.id}>
                <circle cx={xPos(i)} cy={yPos(d.score)} r={d.isCurrent ? 7 : 4} fill={d.isCurrent ? "var(--gold)" : "var(--ink)"} stroke="white" strokeWidth="2" />
                {d.isCurrent && (
                  <text x={xPos(i)} y={yPos(d.score) - 14} fontSize="11" fill="var(--gold)" textAnchor="middle" fontWeight="600">
                    {d.score.toFixed(1)}
                  </text>
                )}
              </g>
            ))}
            {/* X-axis labels (first and last only) */}
            <text x={padding.left} y={height - 10} fontSize="10" fill="rgba(11,24,40,0.4)">
              {data[0].date.toLocaleDateString(undefined, { month: "short", day: "numeric" })}
            </text>
            <text x={padding.left + chartW} y={height - 10} fontSize="10" fill="rgba(11,24,40,0.4)" textAnchor="end">
              {data[data.length - 1].date.toLocaleDateString(undefined, { month: "short", day: "numeric" })}
            </text>
          </svg>
          {data.length >= 4 && (
            <div className="mt-4 text-center text-xs text-[var(--ink)]/60">
              {trend > 0.5 && <span style={{ color: "var(--gold)" }}>↗ Trending up · +{trend.toFixed(1)} vs your earlier sessions</span>}
              {trend < -0.5 && <span style={{ color: "var(--accent)" }}>↘ Trending down · {trend.toFixed(1)} vs your earlier sessions</span>}
              {trend >= -0.5 && trend <= 0.5 && <span>→ Holding steady · keep the reps coming</span>}
            </div>
          )}
        </div>
      );
    }

    // ======================================================================
    // HISTORY VIEW
    // ======================================================================

    function HistoryView({ reports, onView, onDelete }) {
      // Toggle: include Practice + Curriculum sessions in the score stats?
      // Default OFF — only real Pitch sessions count by default.
      // Objections drills are NEVER included regardless of this toggle.
      const [includePractice, setIncludePractice] = useState(false);

      // Compute stats
      const stats = useMemo(() => {
        // Filter according to the toggle. Pitches always count; Practice + Curriculum count only if toggled on.
        const reportsWithScores = reports.filter(r => shouldCountForPersonalStats(r, includePractice) && Object.keys(r.card.scores || {}).length > 0);
        // Use difficulty-ADJUSTED scores for all aggregate stats (leaderboard parity).
        const overallScores = reportsWithScores
          .map(r => getAdjustedScore(r))
          .filter(s => s !== null);

        const overallAvg = overallScores.length > 0
          ? overallScores.reduce((a, b) => a + b, 0) / overallScores.length
          : null;

        // 90-day average
        const cutoff = Date.now() - 90 * 24 * 60 * 60 * 1000;
        const recentReports = reportsWithScores.filter(r => r.createdAt >= cutoff);
        const recentScores = recentReports
          .map(r => getAdjustedScore(r))
          .filter(s => s !== null);

        const last30Avg = recentScores.length > 0
          ? recentScores.reduce((a, b) => a + b, 0) / recentScores.length
          : null;

        // Line chart data — chronological order, ADJUSTED scores so the chart matches leaderboard
        const barData = [...reportsWithScores]
          .sort((a, b) => a.createdAt - b.createdAt)
          .map(r => {
            const score = getAdjustedScore(r) ?? 0;
            return { id: r.id, score, date: new Date(r.createdAt), mode: r.mode };
          });

        // Per-category breakdown: all-time vs last-90-days, with trend
        const categoryBreakdown = computeCategoryBreakdown(reportsWithScores);

        return { overallAvg, last30Avg, totalSessions: reports.length, scoredSessions: overallScores.length, barData, recentCount: recentReports.length, categoryBreakdown };
      }, [reports, includePractice]);

      return (
        <div className="max-w-5xl mx-auto px-8 py-12 fade-up">
          <div className="text-xs uppercase tracking-[0.25em] text-[var(--ink)]/50 mb-2">Library</div>
          <h1 className="font-display text-4xl mb-2">All Report Cards</h1>
          <p className="text-sm text-[var(--ink)]/60 mb-6">Your complete training history. Click any card to revisit feedback and the full transcript.</p>

          {/* Stats filter toggle */}
          <div className="card p-4 mb-8 flex items-center justify-between flex-wrap gap-3">
            <div className="min-w-0">
              <div className="text-[10px] uppercase tracking-[0.2em] text-[var(--ink)]/60 mb-0.5">Score stats include</div>
              <div className="text-xs text-[var(--ink)]/50">
                {includePractice
                  ? "Pitches + Practice + Curriculum sessions"
                  : "Pitches only — Practice and Curriculum are excluded by default"}
              </div>
            </div>
            <div className="mode-toggle shrink-0">
              <button
                onClick={() => setIncludePractice(false)}
                className={!includePractice ? "active" : ""}
                title="Only count real Pitch sessions in your stats"
              >
                Pitches Only

              </button>

          {/* Stats header */}

                <div className="font-display text-4xl mb-1" style={{ color: stats.last30Avg ? "var(--ink)" : "var(--ink)" + "33" }}>

                </div>

            <div className="mb-10">
              <div className="flex items-baseline justify-between mb-4">
                <h2 className="font-display text-2xl">Section Analysis</h2>
                <p className="text-xs text-[var(--ink)]/50">All-time, last 90 days, and trend by category</p>
              </div>
              <CategoryBreakdownGrid breakdown={stats.categoryBreakdown} />
            </div>
          )}

          {reports.length === 0 ? (
            <div className="card p-12 text-center">
              <div className="font-display text-xl text-[var(--ink)]/50 mb-2">Nothing here yet</div>

            </div>
          ) : (
            <div>
              <div className="text-[10px] uppercase tracking-[0.25em] text-[var(--ink)]/50 mb-3">All Sessions</div>
              <div className="grid md:grid-cols-2 gap-4">
                {reports.map(r => (
                  <ReportCardSummary
                    key={r.id}
