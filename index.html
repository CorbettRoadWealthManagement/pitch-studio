  <style>
    :root {
      /* Corbett Road brand colors */
      --teal: #216561;
      --teal-deep: #1a4f4c;
      --teal-soft: #3a8a85;
      --grey-dark: #5f6062;
      --grey-light: #b6b8ba;
      --grey-bg: #e8e8e9;
      --grey-page: #f1f1f2;

      /* Semantic CSS vars (names kept stable so component code is unchanged) */
      --ink: #5f6062;            /* primary text — dark grey */
      --ink-soft: #4a4b4d;       /* hover/active state */
      --parchment: #ffffff;      /* "warm" surface — now clean white */
      --parchment-dim: #f1f1f2;  /* dim warm surface */
      --cream: #f7f7f8;          /* page background — soft light grey */
      --gold: #216561;           /* accent — now teal */
      --gold-soft: #3a8a85;      /* lighter accent — soft teal */
      --accent: #a83232;         /* warning / negative — restrained red */
      --rule: rgba(95, 96, 98, 0.18);
    }

    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Source Sans 3', 'Myriad Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--cream);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .font-display {
      font-family: 'Source Serif 4', 'Myriad Pro', Georgia, serif;
      font-feature-settings: "ss01";
      letter-spacing: -0.01em;
      color: var(--grey-dark);
    }

    .font-mono {
      font-family: 'SF Mono', Menlo, Consolas, monospace;
    }

    /* Subtle paper texture */
    .paper-bg {
      background-color: var(--cream);
      background-image:
        radial-gradient(at 20% 10%, rgba(33, 101, 97, 0.05) 0px, transparent 50%),
        radial-gradient(at 80% 90%, rgba(95, 96, 98, 0.04) 0px, transparent 50%);
    }

    .ink-bg {
      background: var(--teal);
      color: white;
    }
    .ink-bg .font-display {
      color: white;
    }

    .gold-rule {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    .btn-primary {
      background: var(--teal);
      color: white;
      transition: all 0.2s ease;
      border: 1px solid var(--teal);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--teal-deep);
      border-color: var(--teal-deep);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(33, 101, 97, 0.22);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--rule);
      transition: all 0.2s ease;
    }
    .btn-ghost:hover {
      background: rgba(95, 96, 98, 0.05);
      border-color: var(--ink);
    }

    .btn-gold {
      background: var(--teal);
      color: white;
      border: 1px solid var(--teal);
      transition: all 0.2s ease;
    }
    .btn-gold:hover:not(:disabled) {
      background: var(--teal-deep);
      border-color: var(--teal-deep);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(33, 101, 97, 0.22);
    }

    .input-field {
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--rule);
      color: var(--ink);
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--teal);
      background: white;
      box-shadow: 0 0 0 3px rgba(33, 101, 97, 0.1);
    }

    .card {
      background: white;
      border: 1px solid var(--rule);
      border-radius: 4px;
    }

    .card-warm {
      background: rgba(33, 101, 97, 0.04);
      border: 1px solid rgba(33, 101, 97, 0.15);
      border-radius: 4px;
    }

    /* Pulsing mic indicator */
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .pulse-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      animation: pulse-ring 1.5s ease-out infinite;
    }
    .pulse-ring::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      animation: pulse-ring 1.5s ease-out 0.5s infinite;
    }

    /* Speaking waveform */
    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }
    .wave-bar {
      animation: wave 0.8s ease-in-out infinite;
    }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; }

    /* Reveal animation */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up {
      animation: fade-up 0.4s ease-out both;
    }

    /* Score bar animation */
    @keyframes fill-bar {
      from { width: 0; }
    }
    .score-bar-fill {
      animation: fill-bar 1s ease-out;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(95,96,98,0.25); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(95,96,98,0.45); }

    /* Mode toggle */
    .mode-toggle {
      background: rgba(95, 96, 98, 0.08);
      border-radius: 999px;
      padding: 4px;
      display: inline-flex;
    }
    .mode-toggle button {
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: all 0.2s ease;
      color: var(--ink);
      background: transparent;
    }
    .mode-toggle button.active {
      background: var(--teal);
      color: white;
    }

    /* PRINT STYLES — used when manager prints the Team Reports view */
    @media print {
      /* Hide UI chrome */
      header, nav, .no-print {
        display: none !important;
      }
      /* Strip backgrounds and shadows for ink savings */
      body, .paper-bg {
        background: white !important;
      }
      .card, .card-warm {
        background: white !important;
        border: 1px solid #ccc !important;
        box-shadow: none !important;
        page-break-inside: avoid;
      }
      .ink-bg {
        background: white !important;
        color: black !important;
        border: 1px solid #333 !important;
      }
      /* Force section breaks */
      .print-page-break {
        page-break-before: always;
      }
      /* Larger margins on printed output */
      @page {
        margin: 0.75in;
      }
      /* Don't break inside pair cards */
      .print-keep-together {
        page-break-inside: avoid;
      }
    }
  </style>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ======================================================================

    // ======================================================================

    const COMPANY_DOMAIN = "corbettroad.com";
    const APP_NAME = "Corbett Road · Pitch Studio";
    const ADMIN_EMAIL = "camilla.carvalho@corbettroad.com";

    // ======================================================================
    // SUPABASE CONFIGURATION
    // ======================================================================
    // These are safe to be public — the publishable key only allows actions
    // permitted by the database's Row Level Security policies.
    const SUPABASE_URL = "https://silyiacgkhdhnlvccagd.supabase.co";
    const SUPABASE_KEY = "sb_publishable__YZpio33kul1PkY8Zxg-gw_BmHFhIlT";

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
      },
    });

    // Groq free models — fast for live chat, smarter for grading
    const MODEL_PROSPECT = "llama-3.1-8b-instant";       // fast for back-and-forth
    const MODEL_COACH    = "llama-3.3-70b-versatile";    // smarter for suggestions
    const MODEL_GRADER   = "llama-3.3-70b-versatile";    // smarter for report cards

    const GROQ_ENDPOINT = "https://api.groq.com/openai/v1/chat/completions";

    // ======================================================================
    // PROMPTS
    // ======================================================================

    const DIFFICULTY_INSTRUCTIONS = {
      Easy: `DIFFICULTY: EASY — You are an easy-going, trusting prospect. The advisor across from you is newer, and you should be helpful in a way that lets them practice. Specifically:
- Volunteer information freely. If asked a vague question, give a thoughtful, expansive answer.
- When the advisor asks about your goals or concerns, share them openly. Don't make them dig.
- Accept reasonable explanations without heavy pushback. You're the kind of prospect who came in already inclined to like them.
- Gently nudge the advisor along if they seem stuck — drop hints about what you care about.
- Don't ask hard challenging questions about fees or strategy unless they make a clear mistake.
- Tone: warm, cooperative, slightly enthusiastic.`,

      Medium: `DIFFICULTY: MEDIUM — You are a realistic prospect: open but appropriately skeptical. Specifically:
- Ask questions and raise concerns naturally, but don't be hostile.
- Occasionally push back if something feels off, but accept good answers.
- Reveal information when asked thoughtful questions, but don't volunteer everything.
- Have one or two specific concerns you care about — bring them up when relevant.
- Tone: professional, curious, evaluating but fair.`,

      Hard: `DIFFICULTY: HARD — You are a difficult, sophisticated, and skeptical prospect. You've been burned by an advisor before and you're protective of your money. You've done your research. You ask sharp questions across EVERY area, not just one. Specifically, push hard on all of the following whenever they come up:

- **PROCESS**: "Walk me through your actual process. What's the first 90 days look like? Who am I working with — you or some junior associate?" "What happens when you're on vacation?" "How often will we meet — and is that calendar time or actual review time?"
- **FEES**: "What does this actually cost me, all-in? AUM fee, transaction fees, fund expenses, custodian fees — give me the total." "How is your fee structure better than Vanguard's 0.04% or a robo-advisor's 0.25%?" "Are there any fees I won't see on my statement?"
- **BENEFITS**: "Why should I pay 1% to you when I could DIY this for almost free?" "What do I actually get for that fee that I couldn't get from Schwab or Fidelity for less?"
- **RETURNS & PERFORMANCE**: "What's your average client return, net of fees, over the last 5 years? 10 years?" "Compared to what benchmark?" "How did your clients do in 2008? In 2020? In 2022?"
- **CREDENTIALS**: "What are your actual credentials — CFP, CFA, what?" "How long have you been doing this?" "What's your team's experience with someone in my situation?"
- **CONFLICTS OF INTEREST**: "Are you a fiduciary 100% of the time, or only when it's convenient?" "Do you receive any commissions, kickbacks, or revenue sharing from any products you'd recommend?" "Why is this firm a better choice than the last one I just left?"
- **COMMUNICATION & REPORTING**: "How will I know what's happening with my money between meetings?" "What does your reporting look like? Show me an example." "Who do I call when something goes wrong at 9pm on a Sunday?"
- **PHILOSOPHY**: "What's your investment philosophy in plain English?" "Active or passive? Why?" "What do you think the market does in the next 12 months?" (push back on whatever they say)

Behavioral rules:
- Don't volunteer information. Make the advisor work for it. Give terse answers when asked vague questions.
- Express doubt on broad claims. Demand specifics, evidence, examples.
- If they use jargon, call it out: "What does 'tax-loss harvesting' actually mean for someone like me?"
- Interrupt yourself with a new concern occasionally, jumping topics — that's how skeptical clients actually behave.
- You can warm up if the advisor handles you well across multiple areas — but they have to earn it across PROCESS, FEES, RETURNS, and CONFLICTS, not just one.
- Tone: skeptical, demanding, direct, occasionally cold. Not rude, but not friendly until earned.`,
    };

    const CURRICULUM_STEPS = {
      meeting_introduction: {
        label: "Meeting Introduction",
        order: 1,
        scenario: "This is the very start of the meeting. You and the prospect have just sat down. The prospect is waiting for you to open.",
        prospectPrimer: "You've just sat down across from the advisor. You're waiting for them to take the lead and open the meeting professionally.",
        focus: "Practice opening the meeting warmly, setting the agenda, establishing credibility, and making the prospect comfortable.",
      },
      profiling: {
        label: "Profiling the Prospect",
        order: 2,
        scenario: "Introductions are over. You and the prospect have exchanged pleasantries — now it's time to learn about them.",
        prospectPrimer: "Introductions are done. You've said something brief like 'Yeah, glad to be here. Where would you like to start?' — and now you're waiting to be asked thoughtful questions about your situation.",
        focus: "Practice asking situation questions to understand the prospect's life, work, family, financial situation. Don't pitch — just learn.",
      },
      uncovering_problems: {
        label: "Uncovering Key Problems & Concerns",
        order: 3,
        scenario: "You've gathered the basics about the prospect — their job, family, retirement timeline, current investments. Now you need to uncover their REAL concerns and pain points.",
        prospectPrimer: "The advisor has already learned the basics about you (job, family, retirement timeframe, current portfolio). You haven't yet revealed your deeper concerns. Begin by giving a brief recap of one piece of your situation, then wait for the advisor to probe deeper.",
        focus: "Practice probing for real concerns and pain points beneath the surface. Use problem questions to surface what's actually worrying them.",
      },
      reviewing_implications: {
        label: "Reviewing Implications",
        order: 4,
        scenario: "The prospect has shared a real concern. Now you need to explore what that concern would mean — financially, emotionally, for their family — if it's not addressed.",
        prospectPrimer: "The advisor knows your basics and you've just shared one specific concern (e.g., 'I'm not sure if I'll have enough to retire when I want to' or 'I'm worried about taxes eating into what I leave my kids'). You haven't yet thought through what that concern would actually mean if it played out. Wait for the advisor to help you explore it.",
        focus: "Practice asking implication questions that help the prospect feel the weight of their concerns — emotional, financial, family impact.",
      },
      providing_solutions: {
        label: "Providing Clear Solutions",
        order: 5,
        scenario: "You understand the prospect's situation, their concerns, and the implications. Now present clear, tailored solutions that connect Corbett Road's services to what they specifically said.",
        prospectPrimer: "The advisor understands your situation and your concerns. You've explored the implications together. Now you're sitting back, looking at them, and you ask something like: 'So... what would you actually do for me?' Wait for them to present solutions tailored to what you've shared.",
        focus: "Practice presenting solutions that explicitly tie back to what the prospect said. Avoid generic feature lists. Connect each service to a specific concern.",
      },
      call_to_action: {
        label: "Call to Action & Next Steps",
        order: 6,
        scenario: "Solutions are presented. The prospect seems interested but hasn't committed. Now move them to a specific next step.",
        prospectPrimer: "The advisor has presented solutions and you're interested but cautious. You say something like: 'This sounds promising... so what's the next step?' or 'I need to think about it.' Wait for them to propose a clear, low-friction next step.",
        focus: "Practice asking for a specific commitment — schedule a follow-up, send a plan, gather documents. Make the next step easy to say yes to.",
      },
      wrap_up: {
        label: "Meeting Wrap-Up",
        order: 7,
        scenario: "Next steps are agreed. Now wrap up the meeting professionally — summarize, reinforce the relationship, leave the door open.",
        prospectPrimer: "You've agreed on next steps. The meeting is winding down. You say something like: 'Great, I think this was helpful.' Wait for the advisor to wrap things up professionally.",
        focus: "Practice summarizing what was agreed, expressing genuine appreciation, and leaving with warm professionalism.",
      },
    };

    const buildProspectSystemPrompt = (persona) => {
      const difficulty = persona.difficulty || "Medium";
      const difficultyBlock = DIFFICULTY_INSTRUCTIONS[difficulty] || DIFFICULTY_INSTRUCTIONS.Medium;

      let curriculumBlock = "";
      if (persona.focusStep && CURRICULUM_STEPS[persona.focusStep]) {
        const step = CURRICULUM_STEPS[persona.focusStep];
        curriculumBlock = `

CURRICULUM MODE — FOCUSED PRACTICE:
The advisor is practicing a single step of the pitch process: "${step.label}".
SCENARIO PRIMER: ${step.prospectPrimer}
Open the conversation with one short turn that puts the advisor at this step in the pitch — NOT at the very beginning. Don't introduce yourself again or say hello unless the step is "Meeting Introduction". Just pick up mid-conversation as the primer describes.
This will be a SHORT focused session (~3-5 minutes). Stay engaged and let them practice this step.`;
      }

      return `You are role-playing as a prospective wealth management client meeting a financial advisor from Corbett Road Wealth Management. You are evaluating whether to hire them.

YOUR CHARACTER DETAILS:
- Name: ${persona.name || "[invent a realistic name]"}
- Age: ${persona.age || "[invent — typically 45–70]"}
- Retirement timeframe: ${persona.retirement || "[invent]"}
- What you want in retirement: ${persona.retirementGoals || "[invent realistic lifestyle goals]"}
- Current investment strategies: ${persona.currentStrategies || "[invent — e.g. 401k, some individual stocks, savings account]"}
- Primary financial goal: ${persona.primaryGoal || "[invent]"}
- Investing comfort level: ${persona.comfortLevel || "[invent — conservative, moderate, or aggressive]"}
- Estimated time before pulling money from savings: ${persona.pullTime || "[invent]"}
- Current monthly savings: ${persona.monthlySavings || "[invent realistic figure]"}
- Current household income: ${persona.income || "[invent realistic figure]"}
- Current investable assets: ${persona.assets || "[invent realistic figure]"}

ADDITIONAL CONTEXT FROM USER (if any): ${persona.notes || "(none)"}

${difficultyBlock}
${curriculumBlock}

CRITICAL RULES — READ CAREFULLY:
1. Stay in character as this prospect at all times. Never break character. Never mention you are an AI.
2. Do NOT coach the advisor. Do NOT provide feedback. You are the prospect, not a coach.
3. Fill in gaps in your background by inventing realistic, consistent details as needed. Remember what you've said and stay consistent.
4. Speak naturally. Keep responses concise — usually 1–3 sentences. This is a real conversation.
5. Use natural speech patterns — fillers, hesitations, "yeah", "well", "honestly" — like a real person speaking out loud. Avoid lists and bullet points.
6. If the advisor asks something you wouldn't reasonably know, say so naturally ("I'd have to check on that").
7. When the advisor thanks you and asks for feedback, that signals the end. Do NOT switch into coach mode — the system will handle the report card separately.
8. Never use markdown formatting. Just speak.
9. NEVER narrate physical actions, expressions, gestures, or pauses. Do NOT write things like *smiles*, *nods*, *leans forward*, *laughs*, [pauses thoughtfully], (sighs), or any similar stage directions. You are speaking aloud only — output ONLY the words you would actually say. If you would smile or pause in real life, just keep speaking — the system speaks your output through text-to-speech and stage directions sound absurd when read aloud.

${persona.focusStep ? "Open the conversation now per the curriculum primer above." : "Begin the conversation as the prospect. Wait for the advisor to start, then respond naturally."}`;
    };

    // Trim a transcript to the most recent N turns while preserving the first 2 (anchor).
    // Used to keep token usage bounded on long sessions.
    // Below threshold: returns the array unchanged.
    // Above threshold: returns first 2 + last (threshold-2) turns.
    function trimTranscriptForContext(transcript, threshold = 12) {
      if (!Array.isArray(transcript) || transcript.length <= threshold) {
        return transcript || [];
      }
      const anchor = transcript.slice(0, 2);
      const recent = transcript.slice(transcript.length - (threshold - 2));
      return [...anchor, ...recent];
    }

    // Wraps the prospect system prompt with a "WHAT YOU'VE ALREADY SHARED" memory block.
    // This persistent memory lets the prospect remember facts they revealed earlier in the
    // meeting even after older transcript turns have been trimmed.
    // If `facts` is empty or null, this returns the base prompt unchanged.
    const buildProspectSystemPromptWithMemory = (persona, facts) => {
      const base = buildProspectSystemPrompt(persona);
      if (!facts || facts.length === 0) return base;
      const factsBlock = `

WHAT YOU'VE ALREADY SHARED IN THIS MEETING (remember these and stay consistent):
${facts.map(f => `  - ${f}`).join("\n")}

Stay consistent with what you've already told the advisor. Do not contradict these facts. If asked again about something you already said, you can reference what you said before.`;
      // Insert the memory block BEFORE the final "Begin the conversation..." line so it doesn't
      // change the model's understanding of when to open. We append it just before that line.
      const finalLineMarker = "Begin the conversation as the prospect.";
      const openMarker = "Open the conversation now per the curriculum primer above.";
      if (base.includes(finalLineMarker)) {
        return base.replace(finalLineMarker, factsBlock + "\n\n" + finalLineMarker);
      }
      if (base.includes(openMarker)) {
        return base.replace(openMarker, factsBlock + "\n\n" + openMarker);
      }
      // Fallback if neither marker is found (shouldn't happen, but safe)
      return base + factsBlock;
    };

    // Build the prompt for the fact-extraction call.
    // Strict instructions to prevent hallucination — only direct facts the prospect actually stated.
    const buildFactExtractionPrompt = (prospectTurn, recentContext) => `Extract any NEW factual statements the prospect made in their most recent turn. The prospect is role-playing as a wealth management client.

CONTEXT FOR REFERENCE (do not extract from this — for context only):
${recentContext}

PROSPECT'S MOST RECENT TURN (extract facts FROM THIS):
"${prospectTurn}"

INSTRUCTIONS:
- Output ONLY direct factual statements the prospect made in their most recent turn.
- Each fact should be ONE short sentence (under 15 words).
- Examples of good facts: "Has $400,000 in 401(k)", "Husband Tom retired 6 months ago", "Lost ~30% in 2008 and is now risk-averse", "Wants to retire in about 8 years", "Has two kids in college".
- Do NOT speculate. Do NOT extrapolate. Do NOT include emotions or attitudes unless explicitly stated.
- Do NOT include things the advisor said, only the prospect.
- If the prospect was vague, asked a question, or didn't reveal anything new, return an empty array.
- Do NOT repeat facts that are already implied by the persona description or earlier turns.

Return ONLY valid JSON in this exact shape (no markdown, no commentary outside JSON):
{
  "facts": ["fact 1", "fact 2", ...]
}`;


    const buildCoachSystemPrompt = () => `You are a senior sales coach observing a financial advisor's pitch to a prospect in real time. Your job is to suggest what an EXPERT advisor would say next, based on what the prospect just said.

Use SPIN selling principles (Situation, Problem, Implication, Need-Payoff) and consultative sales best practices. Reward:
- Asking discovery questions before pitching
- Uncovering implications and emotional drivers
- Building rapport before solutioning
- Avoiding jargon and pressure tactics
- Tying solutions to the prospect's specific stated concerns

Provide a brief, specific, conversational suggestion of what the advisor should say next. 2–3 sentences max. Sound natural, not scripted. Do not use markdown. Do not preface with "You should..." — just give the actual words.`;

    const buildGraderSystemPrompt = (persona, transcript) => {
      const difficulty = persona.difficulty || "Medium";
      const focusStep = persona.focusStep;
      const focusBlock = focusStep && CURRICULUM_STEPS[focusStep] ? `

CURRICULUM MODE — FOCUSED PRACTICE:
This was a focused practice session on a single step: "${CURRICULUM_STEPS[focusStep].label}".
${CURRICULUM_STEPS[focusStep].focus}
The conversation was intentionally short and limited to this step.
For categories OTHER than the focused step, set "score" to null (not 0, not a guess) — those steps were NOT in scope and should be excluded from the report card. Only score the FOCUSED step rigorously and provide detailed evidence.` : "";

      return `You are a senior sales coach reviewing a financial advisor's pitch to a prospective wealth management client. Score the pitch and provide evidence-based feedback.

PROSPECT PROFILE:
${JSON.stringify(persona, null, 2)}

DIFFICULTY LEVEL: ${difficulty}
${difficulty === "Easy" ? "(The prospect was set to easy mode — they were cooperative and helpful. Adjust your scoring accordingly: don't reward the advisor for getting cooperation that was given freely.)" : ""}
${difficulty === "Hard" ? "(The prospect was set to hard mode — they pushed back, asked challenging questions about fees, and were skeptical. Reward the advisor for handling difficulty well.)" : ""}
${focusBlock}

    function pushRecentPersona(persona) {
      try {
        if (!persona || !persona.name) return;
        // Extract a profession hint from the notes field (the prompt asks for
        // "name their occupation specifically" so the profession usually appears here)
        const notes = (persona.notes || "").trim();
        // Use the first ~80 chars of notes as a "situation snapshot" for the model

          age: persona.age || "",
          // Pull out an occupation hint by looking for common profession words in the notes
          profession: extractProfessionHint(notes),
          situation: situation,

        const filtered = current.filter(p => (p.name || "").toLowerCase() !== entry.name.toLowerCase());
        const updated = [entry, ...filtered].slice(0, RECENT_PERSONAS_CAP);

        localStorage.setItem("crpt_recent_personas", JSON.stringify(updated));

    async function callGroq({ apiKey, model, messages, temperature = 0.7, jsonMode = false }) {
      const body = {
        model,
        messages,
        temperature,
      };
      if (jsonMode) {
        body.response_format = { type: "json_object" };
      }

      const res = await fetch(GROQ_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`,
        },
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`Groq API error ${res.status}: ${errText}`);
      }

      const data = await res.json();
      return data.choices?.[0]?.message?.content || "";
    }

    // Save a report card to the cloud
    async function saveReportToCloud(userId, report) {
      // The report_cards table schema:
      //   id (text), user_id (uuid), email (text), created_at_ms (bigint), payload (jsonb), created_at (timestamptz)
      // We bundle the full report into the `payload` JSONB column.
      // Get the user's email for the email column (helps with auditing).
      let email = "";
      try {
        const { data } = await sb.auth.getUser();
        email = data?.user?.email || "";
      } catch {}

      const row = {
        id: report.id,
        user_id: userId,
        email,
        created_at_ms: report.createdAt || Date.now(),
        payload: {
          mode: report.mode,
          persona: report.persona || null,
          transcript: report.transcript || [],
          card: report.card || null,
          voiceAnalytics: report.voiceAnalytics || null,
        },
      };
      const { error } = await sb.from("report_cards").insert(row);
      if (error) throw error;
    }

    // Delete a report card from the cloud
    async function deleteReportFromCloud(reportId) {
      const { error } = await sb.from("report_cards").delete().eq("id", reportId);
      if (error) throw error;
    }

    // Convert a database row into our app's report shape
    function rowToReport(row) {
      // The full report is bundled inside the `payload` JSONB column.
      const payload = row.payload || {};
      return {
        id: row.id,
        userId: row.user_id,
        mode: payload.mode,
        persona: payload.persona,
        transcript: payload.transcript || [],
        card: payload.card || null,
        voiceAnalytics: payload.voiceAnalytics || null,
        createdAt: row.created_at_ms || (row.created_at ? new Date(row.created_at).getTime() : Date.now()),
      };
    }

    // Migrate any pre-Supabase localStorage reports to the cloud (one-time)
    async function migrateLocalReportsIfNeeded(userId) {
      if (storage.get(STORAGE_KEYS.migrationComplete)) return;
      const local = storage.get(STORAGE_KEYS.reports, []);
      if (!Array.isArray(local) || local.length === 0) {
        storage.set(STORAGE_KEYS.migrationComplete, true);
        return;
      }
      console.log(`Migrating ${local.length} local reports to cloud...`);
      let migrated = 0;
      for (const r of local) {
        try {
          await saveReportToCloud(userId, r);
          migrated++;
        } catch (e) {
          console.warn("Failed to migrate one report:", e);
        }
      }
      storage.set(STORAGE_KEYS.migrationComplete, true);
      console.log(`Migration complete: ${migrated}/${local.length} reports.`);
    }

    // ======================================================================
    // VOICE HELPERS — Web Speech API
    // ======================================================================

    function getSpeechRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return null;
      const rec = new SR();
      rec.continuous = true;
      rec.interimResults = true;
      rec.lang = "en-US";
      return rec;
    }

    function getBestVoice(preferredName) {
      const voices = window.speechSynthesis.getVoices();
      if (!voices || voices.length === 0) return null;
      if (preferredName) {
        const match = voices.find(v => v.name === preferredName);
        if (match) return match;
      }
      // Prefer a natural-sounding English voice; weight Google voices first
      const en = voices.filter(v => v.lang.startsWith("en"));
      const preferred = en.find(v => /Google US English/i.test(v.name)) ||
                        en.find(v => /Microsoft.*(Aria|Jenny|Guy|Davis|Tony)/i.test(v.name)) ||
                        en.find(v => /Samantha|Alex|Daniel|Karen/i.test(v.name)) ||
                        en[0];
      return preferred || voices[0];
    }

    // Strip stage directions and other narration that the model occasionally
    // sneaks into prospect dialogue. The TTS engine reads these literally,
    // which sounds absurd ("smiles" gets pronounced as a word).
    //
    // Strips:
    //  - Anything in asterisks: *smiles*, **nods**, *leans forward*
    //  - Anything in square brackets: [pauses], [thoughtfully]
    //  - Parens that LOOK like stage directions (laughs, sighs, smiles, pauses,
    //    nods, gestures, etc.) — but NOT regular parenthetical content like
    //    "$500K (well, $480K)" which is real speech
    function stripStageDirections(text) {
      if (!text) return "";
      let out = text;
      // Remove anything between asterisks (*smiles*, **nods**, *leans in*)
      out = out.replace(/\*+[^*\n]+\*+/g, "");
      // Remove standalone single asterisks left over from any markdown
      out = out.replace(/\*+/g, "");
      // Remove anything between square brackets ([pauses], [thoughtful])
      out = out.replace(/\[[^\]\n]+\]/g, "");
      // Remove parens whose contents are dominated by stage-direction verbs.
      // Conservative pattern: only strip parens whose contents start with one of these verbs.
      const stageDirectionVerbs = /^\s*(laugh|chuckle|smile|smiling|grin|grinning|nod|nodding|sigh|sighing|pause|pausing|hesitate|hesitating|lean|leaning|gesture|gesturing|smirk|smirking|frown|frowning|shrug|shrugging|tilt|tilting|raise|raising|fold|folding|cross|crossing|clear throat|takes a breath|deep breath|long pause|short pause|silent|silence|thoughtful|thinking|considering|amused|surprised|skeptical|nervous|anxious)/i;
      out = out.replace(/\(([^)\n]+)\)/g, (match, inner) => {
        return stageDirectionVerbs.test(inner) ? "" : match;
      });
      // Collapse multiple spaces, trim
      return out.replace(/\s{2,}/g, " ").trim();
    }

    function speak({ text, voice, rate, onStart, onEnd }) {
      return new Promise((resolve) => {
        if (!text || !text.trim()) { resolve(); return; }
        const utter = new SpeechSynthesisUtterance(text);
        if (voice) utter.voice = voice;
        // Clamp rate to a sensible range (browser allows 0.1–10 but quality degrades outside ~0.75–2.0)
        const safeRate = typeof rate === "number" && !isNaN(rate) ? Math.max(0.5, Math.min(2.0, rate)) : 1.0;
        utter.rate = safeRate;
        utter.pitch = 1.0;
        utter.onstart = () => { if (onStart) onStart(); };
        utter.onend = () => { if (onEnd) onEnd(); resolve(); };
        utter.onerror = () => { if (onEnd) onEnd(); resolve(); };
        window.speechSynthesis.speak(utter);
      });
    }

    function stopSpeaking() {
      try { window.speechSynthesis.cancel(); } catch {}
    }

    // Pause the currently-playing utterance without canceling it.
    // Different from stop: paused audio can be resumed at the same point.
    function pauseSpeaking() {
      try { window.speechSynthesis.pause(); } catch {}
    }

    function resumeSpeaking() {
      try { window.speechSynthesis.resume(); } catch {}
    }

    // ======================================================================
    // BROWSER DETECTION
    // ======================================================================

    function detectBrowser() {
      const ua = navigator.userAgent;
      // Order matters — Edge & Opera both contain "Chrome" in UA, so check them first
      if (/Edg\//.test(ua)) return "Edge";
      if (/OPR\//.test(ua) || /Opera/.test(ua)) return "Opera";
      if (/Brave/.test(ua) || (navigator.brave && navigator.brave.isBrave)) return "Brave";
      if (/Firefox\//.test(ua)) return "Firefox";
      if (/Chrome\//.test(ua)) return "Chrome";
      if (/Safari\//.test(ua)) return "Safari";
      return "an unsupported browser";
    }

    // ======================================================================
    // PASSCODE HASHING & NAME HELPERS
    // ======================================================================

    async function hashPasscode(email, passcode) {
      const data = new TextEncoder().encode(`${email.toLowerCase()}:${passcode}`);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
    }

    function nameFromEmail(email) {
      return email.split("@")[0]
        .split(/[._\-]/)
        .filter(Boolean)
        .map(s => s[0].toUpperCase() + s.slice(1))
        .join(" ");
    }

    // ======================================================================
    // VOICE ANALYTICS — compute speech metrics from transcript
    // ======================================================================

    function computeVoiceAnalytics(transcript) {
      if (!transcript || transcript.length === 0) return null;

      const advisorTurns = transcript.filter(t => t.role === "advisor");
      const prospectTurns = transcript.filter(t => t.role === "prospect");

      const wordsOf = (text) => text.toLowerCase().split(/\s+/).filter(w => w.length > 0);

      const advisorWords = advisorTurns.flatMap(t => wordsOf(t.text));
      const prospectWords = prospectTurns.flatMap(t => wordsOf(t.text));

      const totalAdvisorWords = advisorWords.length;
      const totalProspectWords = prospectWords.length;
      const totalWords = totalAdvisorWords + totalProspectWords;
      const talkRatio = totalWords > 0 ? totalAdvisorWords / totalWords : 0;

      // Filler word detection
      const fillerCount = {};
      // Single-word fillers (need exact word match, ignoring punctuation)
      const singleFillers = ["um", "uh", "uhm", "er", "ah", "like", "basically", "literally", "actually", "honestly"];
      singleFillers.forEach(filler => { fillerCount[filler] = 0; });
      advisorWords.forEach(w => {
        const clean = w.replace(/[.,!?;:'"]/g, "");
        if (singleFillers.includes(clean)) fillerCount[clean] += 1;
      });

      // Multi-word fillers (regex on the joined text)
      const advisorText = advisorTurns.map(t => t.text.toLowerCase()).join(" ");
      const multiFillers = ["you know", "kind of", "sort of", "i mean", "i guess"];
      multiFillers.forEach(filler => {
        const escaped = filler.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const matches = advisorText.match(new RegExp(`\\b${escaped}\\b`, "g")) || [];
        fillerCount[filler] = matches.length;
      });

      const totalFillers = Object.values(fillerCount).reduce((a, b) => a + b, 0);
      const fillerPercentage = totalAdvisorWords > 0 ? (totalFillers / totalAdvisorWords) * 100 : 0;

      const topFillers = Object.entries(fillerCount)
        .filter(([_, count]) => count > 0)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3);

      const sessionDurationMs = transcript.length > 0
        ? transcript[transcript.length - 1].ts - transcript[0].ts
        : 0;
      const sessionDurationMin = sessionDurationMs / 1000 / 60;

      return {
        totalAdvisorWords,
        totalProspectWords,
        talkRatio,
        fillerCount: totalFillers,
        fillerPercentage,
        topFillers,
        averageTurnWords: advisorTurns.length > 0 ? Math.round(totalAdvisorWords / advisorTurns.length) : 0,
        advisorTurnCount: advisorTurns.length,
        prospectTurnCount: prospectTurns.length,
        sessionDurationMin,
      };
    }

        setSavedToast(true);

        setPwStatus(null);

        if (newPassword !== confirmNewPassword) { setPwStatus({ error: "Passwords don't match." }); return; }

          const { error } = await sb.auth.updateUser({ password: newPassword });
          if (error) {
            setPwStatus({ error: error.message });
            return;
          }
          setPwStatus("ok");
          setNewPassword(""); setConfirmNewPassword("");
          setTimeout(() => setPwStatus(null), 4000);

          setPwStatus({ error: e.message || "Couldn't update password." });
        }
      };

        setTestStatus("testing");

            model: MODEL_PROSPECT,
            messages: [{ role: "user", content: "Say the single word: ready" }],

                </div>
              </div>
              <button onClick={dismissPiiBanner} className="text-[10px] uppercase tracking-[0.18em] text-[var(--ink)]/50 hover:text-[var(--ink)] shrink-0 ml-2">
                Got it ✕

            </div>
          )}

          <div className="fade-up">
            <div className="text-xs uppercase tracking-[0.25em] text-[var(--ink)]/50 mb-2">Welcome back, {user.name.split(" ")[0]}</div>

              </div>
              <span className="text-xs text-[var(--ink)]/50 italic">
                {mode === "pitch" && "A live, unassisted peer pitch with the AI prospect."}
                {mode === "practice" && "Same prospect — with a coach offering 'best answer' suggestions in real time."}

                  {mode === "pitch" && "You'll meet a prospective client and run through your pitch live. No hints, no interruptions — just you, the prospect, and the seven-step framework."}
                  {mode === "practice" && "Same as a peer pitch, but a senior coach watches over your shoulder. After each prospect turn, you'll see what an expert advisor might say next — use it or ignore it."}

                {!hasApiKey ? (
                  <div className="bg-white/10 border border-white/20 p-4 rounded inline-block">
                    <p className="text-xs text-white">⚠ Add your free Groq API key in Settings to begin.</p>

                    {mode === "curriculum" && "Pick A Step →"}

          </div>

          {/* Recent report cards */}
          <div className="fade-up" style={{ animationDelay: "0.3s" }}>
            <div className="flex items-center justify-between mb-6">
              <h2 className="font-display text-2xl">Recent report cards</h2>
              {reports.length > 0 && (
                <button onClick={() => onViewReport(null)} className="text-xs uppercase tracking-[0.18em] text-[var(--ink)]/60 hover:text-[var(--ink)]">View all →</button>
              )}
            </div>

            {recent.length === 0 ? (
              <div className="card p-12 text-center">
                <div className="font-display text-xl text-[var(--ink)]/50 mb-2">No sessions yet</div>
